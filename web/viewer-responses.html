<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jawaban · eForm Viewer</title>
<style>
:root{
  --ink:#13171e;--ink-soft:#4a525e;--muted:#79828f;
  --surface:#eef1f5;--panel:#fff;--panel-2:#f7f9fb;
  --line:#dfe4ea;--line-2:#eef1f5;
  --accent:#0e7490;--accent-ink:#0b5563;--accent-soft:#d6edf1;
  --ok:#15803d;--ok-soft:#dcfce7;
  --radius:10px;--radius-s:7px;
  --shadow:0 1px 2px rgba(19,23,30,.06),0 8px 24px -16px rgba(19,23,30,.25);
  --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Inter,sans-serif;
  --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{font-family:var(--sans);color:var(--ink);background:var(--surface);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input,select{font-family:inherit}
.shell{display:flex;flex-direction:column;height:100vh}
.topbar{display:flex;align-items:center;gap:8px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex:none;flex-wrap:wrap}
.form-title{font-weight:600;font-size:15px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:120px}
.count-badge{font-family:var(--mono);font-size:11px;color:var(--accent);background:var(--accent-soft);padding:3px 9px;border-radius:999px;white-space:nowrap;flex:none}
.btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:7px 12px;border-radius:var(--radius-s);font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:.12s;white-space:nowrap}
.btn:hover{border-color:#c6cdd6;background:var(--panel-2)}
.btn-sm{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:4px 9px;border-radius:5px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap}
.btn-sm:hover:not([disabled]){background:var(--panel-2)}
.filter-bar{display:flex;align-items:center;gap:8px;padding:9px 20px;background:var(--panel-2);border-bottom:1px solid var(--line);flex:none;flex-wrap:wrap}
.filter-lbl{font-size:12px;color:var(--muted);font-weight:500;white-space:nowrap}
.filter-search{font-size:12.5px;padding:5px 10px;border:1px solid var(--line);border-radius:var(--radius-s);background:var(--panel);color:var(--ink);width:200px}
.filter-search:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}
.filter-search::placeholder{color:var(--muted)}
.tbl-outer{flex:1;overflow:auto;padding:18px 20px}
.tbl-wrap{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);overflow:auto}
table.resp-tbl{width:100%;border-collapse:collapse;font-size:13px;min-width:500px}
.resp-tbl th{background:var(--panel-2);font-size:11px;text-transform:uppercase;letter-spacing:.05em;color:var(--muted);font-weight:600;padding:10px 13px;border-bottom:1px solid var(--line);white-space:nowrap;text-align:left}
.resp-tbl th.sortable{cursor:pointer;user-select:none}
.resp-tbl th.sortable:hover{color:var(--ink-soft)}
.resp-tbl th.sort-active{color:var(--accent-ink)}
.sort-ic{margin-left:3px;font-size:10px;opacity:.35}
.resp-tbl th.sort-active .sort-ic{opacity:1}
.resp-tbl td{padding:9px 13px;border-bottom:1px solid var(--line-2);vertical-align:middle}
.resp-tbl tbody tr:last-child td{border-bottom:none}
.resp-tbl tbody tr:hover td{background:var(--panel-2)}
.resp-tbl .td-num{font-family:var(--mono);font-size:12px;color:var(--muted);width:48px}
.resp-tbl .td-who{max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.resp-tbl .td-time{white-space:nowrap;font-size:12px;color:var(--muted)}
.resp-tbl .td-val{max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12.5px;color:var(--ink-soft)}
.tbl-foot{display:flex;align-items:center;justify-content:space-between;padding:10px 14px;border-top:1px solid var(--line);font-size:12px;color:var(--muted);background:var(--panel-2)}
.loading,.empty-state{padding:32px;text-align:center;color:var(--muted);font-size:13px}
.notice{background:var(--accent-soft);color:var(--accent-ink);font-size:12px;padding:6px 12px;border-radius:var(--radius-s);flex:none}
.filter-sep{width:1px;height:20px;background:var(--line);flex:none;align-self:center}
.filter-chip{font-size:11px;color:var(--accent);background:var(--accent-soft);padding:3px 9px;border-radius:999px;font-weight:600;white-space:nowrap}
.btn-reset{border:none;background:none;color:var(--muted);padding:3px 6px;border-radius:var(--radius-s);font-size:12px;cursor:pointer}
.btn-reset:hover{background:var(--line-2);color:var(--ink)}
.ff-bar{display:flex;align-items:center;gap:8px;padding:7px 20px;background:#f0f7f9;border-bottom:1px solid var(--line);flex:none;flex-wrap:wrap}
.ff-bar:empty{display:none}
.ff-group{display:flex;align-items:center;gap:5px}
.ff-lbl{font-size:11px;color:var(--accent-ink);font-weight:600;white-space:nowrap;background:var(--accent-soft);padding:2px 7px;border-radius:4px}
.ff-input{font-size:12.5px;padding:4px 9px;border:1px solid var(--accent-soft);border-radius:var(--radius-s);background:var(--panel);color:var(--ink);width:150px}
.ff-input:focus{outline:2px solid var(--accent-soft);border-color:var(--accent)}
.ff-input::placeholder{color:var(--muted)}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <a class="btn" href="/viewer-portal">← Portal</a>
    <span class="form-title" id="formTitle">Memuat…</span>
    <span class="count-badge" id="countBadge" hidden></span>
    <span class="notice" id="accessNotice" hidden></span>
  </header>

  <div class="filter-bar">
    <span class="filter-lbl">Status</span>
    <select id="fStatus" style="font-size:12.5px;padding:5px 8px;border:1px solid var(--line);border-radius:var(--radius-s);background:var(--panel);color:var(--ink)" onchange="onStatusChange()">
      <option value="">Semua</option>
      <option value="submitted">Terkirim</option>
      <option value="draft">Draf</option>
    </select>
    <div class="filter-sep"></div>
    <input class="filter-search" id="fSearch" placeholder="Cari nama / email…" oninput="onSearchDebounce()">
    <span class="filter-chip" id="filterChip" hidden></span>
    <button class="btn-reset" id="btnReset" onclick="resetFilters()" hidden>✕ Reset filter</button>
  </div>

  <div class="ff-bar" id="ffBar"></div>

  <div class="tbl-outer">
    <div class="tbl-wrap" id="tblWrap">
      <div class="loading">Memuat…</div>
    </div>
  </div>
</div>
<script>
const TOKEN=localStorage.getItem("eform_token");
if(!TOKEN)location.replace("/login");
const FORM_ID=new URLSearchParams(location.search).get("id");
if(!FORM_ID)location.replace("/viewer-portal");

const H={"Authorization":"Bearer "+TOKEN,"Content-Type":"application/json"};
const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const txt=v=>v==null?"":(typeof v==="object"?(v.id||Object.values(v)[0]||""):String(v));

let SCHEMA=null, PERM=null, RESPONSES=[], TOTAL=0, PAGE=0;
const PAGE_SIZE=50;
let SEL_COLS=[], ALL_FIELDS=[];
let SORT_BY="waktu", SORT_DIR="desc";
let FILTER_SEARCH="", FILTER_STATUS="";
let FIELD_FILTERS={}, FIELD_EXACT_FILTERS={};
let _searchTimer=null, _fieldTimer=null;

async function api(path,opts={}){
  const r=await fetch(path,{...opts,headers:{...H,...(opts.headers||{})}});
  if(r.status===401){localStorage.removeItem("eform_token");location.replace("/login");throw new Error("sesi habis");}
  const data=(r.headers.get("content-type")||"").includes("json")?await r.json():null;
  if(!r.ok)throw new Error((data&&data.error)||("HTTP "+r.status));
  return data;
}

async function init(){
  try{
    // Cek role
    const me=await api("/api/auth/me");
    if(me.role!=="viewer")location.replace("/admin");

    // Muat permission dan schema secara paralel
    const [perm,form]=await Promise.all([
      api("/api/viewer/forms/"+FORM_ID+"/permission"),
      api("/api/viewer/forms/"+FORM_ID)
    ]);
    PERM=perm; SCHEMA=form.schema;

    document.title="Jawaban · "+(form.title||"Kuesioner");
    document.getElementById("formTitle").textContent=form.title||"Kuesioner";

    // Tampilkan info akses
    const notice=document.getElementById("accessNotice");
    notice.hidden=false;
    const fields=PERM.visibleFields&&PERM.visibleFields.length;
    notice.textContent=`Akses: ${PERM.respondentAccess==="all"?"semua responden":"responden terpilih"}`+
      (fields?` · ${PERM.visibleFields.length} variabel`:" · semua variabel");

    // Kolom tambahan dari konfigurasi admin (column_config form)
    ALL_FIELDS=extractFields(SCHEMA);
    SEL_COLS=form.columnConfig&&Array.isArray(form.columnConfig)?form.columnConfig:[];
    renderFieldFilters();

    await loadPage(0);
  }catch(e){
    document.getElementById("formTitle").textContent="Gagal memuat: "+e.message;
    if(e.message.includes("403")||e.message.includes("akses"))
      document.getElementById("tblWrap").innerHTML='<div class="empty-state">Anda tidak memiliki akses ke kuesioner ini.</div>';
  }
}

function onStatusChange(){
  FILTER_STATUS=document.getElementById("fStatus").value;
  loadPage(0);
}

function onSearchDebounce(){
  clearTimeout(_searchTimer);
  _searchTimer=setTimeout(()=>{
    FILTER_SEARCH=document.getElementById("fSearch").value.trim();
    loadPage(0);
  },350);
}

function resetFilters(){
  FILTER_STATUS="";FILTER_SEARCH="";
  FIELD_FILTERS={};FIELD_EXACT_FILTERS={};
  document.getElementById("fStatus").value="";
  document.getElementById("fSearch").value="";
  renderFieldFilters();
  loadPage(0);
}

function updateFilterUI(){
  const parts=[];
  if(FILTER_STATUS)parts.push(FILTER_STATUS==="submitted"?"Terkirim":"Draf");
  if(FILTER_SEARCH)parts.push(`"${esc(FILTER_SEARCH)}"`);
  Object.entries(FIELD_FILTERS).forEach(([k,v])=>{
    const f=ALL_FIELDS.find(ff=>ff.name===k);
    parts.push(`${esc(f?f.label:k)}: "${esc(v)}"`);
  });
  Object.entries(FIELD_EXACT_FILTERS).forEach(([k,v])=>{
    const fd=findField(SCHEMA,k);
    const fk=fieldFilterKind(fd);
    const f=ALL_FIELDS.find(ff=>ff.name===k);
    let displayVal=v;
    if(fk.kind==="select"){const o=fk.opts.find(x=>x.value===v);if(o)displayVal=o.label;}
    else if(fk.kind==="api"&&_apiOptCache[fk.url]){const o=_apiOptCache[fk.url].find(x=>x.value===v);if(o)displayVal=o.label;}
    else if(fk.kind==="cascade"){
      const ru=fk.urlTpl.replace(/\{([^}]+)\}/g,(_,dk)=>encodeURIComponent(FIELD_EXACT_FILTERS[dk]||""));
      if(_apiOptCache[ru]){const o=_apiOptCache[ru].find(x=>x.value===v);if(o)displayVal=o.label;}
    }
    parts.push(`${esc(f?f.label:k)}: ${esc(displayVal)}`);
  });
  const chip=document.getElementById("filterChip");
  const btnR=document.getElementById("btnReset");
  if(parts.length){chip.textContent=parts.join(" · ");chip.hidden=false;btnR.hidden=false;}
  else{chip.hidden=true;btnR.hidden=true;}
}

function onFieldInput(el){
  const name=el.dataset.field;
  const val=el.value.trim();
  if(val)FIELD_FILTERS[name]=val; else delete FIELD_FILTERS[name];
  clearTimeout(_fieldTimer);
  _fieldTimer=setTimeout(()=>loadPage(0),350);
}

function onFieldSelect(el){
  const name=el.dataset.field;
  const val=el.value;
  if(val)FIELD_EXACT_FILTERS[name]=val; else delete FIELD_EXACT_FILTERS[name];
  const hasCascadeChild=SEL_COLS.some(colName=>{
    if(colName===name)return false;
    const fk=fieldFilterKind(findField(SCHEMA,colName));
    return fk.kind==="cascade"&&fk.deps.includes(name);
  });
  if(hasCascadeChild)renderFieldFilters();
  loadPage(0);
}

function toggleSort(col){
  if(SORT_BY===col)SORT_DIR=SORT_DIR==="asc"?"desc":"asc";
  else{SORT_BY=col;SORT_DIR=col==="waktu"?"desc":"asc";}
  loadPage(0);
}

async function loadPage(page){
  PAGE=page;
  document.getElementById("tblWrap").innerHTML='<div class="loading">Memuat…</div>';
  try{
    const params=new URLSearchParams({limit:PAGE_SIZE,offset:PAGE*PAGE_SIZE,sortBy:SORT_BY,sortDir:SORT_DIR});
    if(FILTER_STATUS)params.set("status",FILTER_STATUS);
    if(FILTER_SEARCH)params.set("search",FILTER_SEARCH);
    Object.entries(FIELD_FILTERS).forEach(([k,v])=>{if(v)params.set("f_"+k,v);});
    Object.entries(FIELD_EXACT_FILTERS).forEach(([k,v])=>{if(v)params.set("fe_"+k,v);});
    const data=await api("/api/viewer/forms/"+FORM_ID+"/responses?"+params);
    RESPONSES=data.responses||[];
    TOTAL=data.total||0;

    const isFiltered=FILTER_STATUS||FILTER_SEARCH||Object.keys(FIELD_FILTERS).length||Object.keys(FIELD_EXACT_FILTERS).length;
    const badge=document.getElementById("countBadge");
    badge.textContent=TOTAL+" jawaban"+(isFiltered?" (difilter)":"");
    badge.hidden=false;
    updateFilterUI();
    renderTable();
  }catch(e){
    document.getElementById("tblWrap").innerHTML=`<div class="empty-state">${esc(e.message)}</div>`;
  }
}

/* ---- field extraction & filter bar (kolom dari konfigurasi admin) ---- */
function extractFields(schema){
  const out=[];
  function walk(comps,inRoster){
    for(const c of comps||[]){
      if(c.kind==="field"){
        if(!inRoster&&c.type!=="note"&&c.type!=="hidden"&&c.type!=="markdown"&&c.name)
          out.push({name:c.name,label:txt(c.label)||c.name});
      }else if(c.kind==="roster"){walk(c.components||[],true);}
      else if(c.components){walk(c.components,inRoster);}
    }
  }
  for(const p of schema?.pages||[])walk(p.components||[],false);
  return out;
}

function fieldFilterKind(c){
  if(!c)return{kind:"text"};
  if(c.type==="boolean")return{kind:"select",opts:[{value:"true",label:"Ya"},{value:"false",label:"Tidak"}]};
  if(c.type==="radio"||c.type==="select"){
    if(c.optionsApi&&c.optionsApi.url){
      const deps=[...c.optionsApi.url.matchAll(/\{([^}]+)\}/g)].map(m=>m[1]);
      const base={valueField:c.optionsApi.valueField||"code",labelField:c.optionsApi.labelField||"label",path:c.optionsApi.path||null};
      if(deps.length)return{kind:"cascade",urlTpl:c.optionsApi.url,deps,...base};
      return{kind:"api",url:c.optionsApi.url,...base};
    }
    if(c.optionsRef){
      const tbl=(SCHEMA.referenceData||{})[c.optionsRef];
      if(tbl){
        if(tbl.items)return{kind:"select",opts:tbl.items.map(it=>({value:String(it.code),label:txt(it.label)}))};
        if(tbl.source==="api"&&tbl.url){
          const deps=[...tbl.url.matchAll(/\{([^}]+)\}/g)].map(m=>m[1]);
          const base={valueField:tbl.valueField||"code",labelField:tbl.labelField||"label",path:tbl.path||null};
          if(deps.length)return{kind:"cascade",urlTpl:tbl.url,deps,...base};
          return{kind:"api",url:tbl.url,...base};
        }
      }
    }
    if(c.options&&c.options.length)return{kind:"select",opts:c.options.map(o=>({value:String(o.value),label:txt(o.label)||String(o.value)}))};
  }
  return{kind:"text"};
}

const _apiOptCache={};
async function fetchApiOpts(src){
  if(_apiOptCache[src.url])return _apiOptCache[src.url];
  try{
    const r=await fetch(src.url,{headers:H});
    const d=await r.json();
    const getPath=(o,p)=>String(p).split(".").reduce((x,k)=>x==null?x:x[k],o);
    let arr=src.path?getPath(d,src.path):(Array.isArray(d)?d:(d.data||d.items||d.results||[]));
    const vf=src.valueField||"code",lf=src.labelField||"label";
    const opts=(arr||[]).map(it=>({value:String(it[vf]),label:txt(it[lf])||String(it[vf])}));
    _apiOptCache[src.url]=opts;
    return opts;
  }catch{return[];}
}

function renderFieldFilters(){
  const bar=document.getElementById("ffBar");
  if(!SEL_COLS.length){bar.innerHTML="";return;}
  // Hapus nilai cascade yang depnya belum terpenuhi
  SEL_COLS.forEach(name=>{
    const fk=fieldFilterKind(findField(SCHEMA,name));
    if(fk.kind==="cascade"&&fk.deps.find(dep=>!FIELD_EXACT_FILTERS[dep]))
      delete FIELD_EXACT_FILTERS[name];
  });
  const parts=SEL_COLS.map((name,i)=>{
    const fd=findField(SCHEMA,name);
    const label=(ALL_FIELDS.find(ff=>ff.name===name)||{}).label||name;
    const sep=i>0?'<div class="filter-sep"></div>':"";
    const fk=fieldFilterKind(fd);
    if(fk.kind==="select"){
      const curVal=FIELD_EXACT_FILTERS[name]||"";
      const optHtml=`<option value="">Semua</option>`+
        fk.opts.map(o=>`<option value="${esc(o.value)}"${curVal===o.value?" selected":""}>${esc(o.label)}</option>`).join("");
      return`${sep}<div class="ff-group"><span class="ff-lbl">${esc(label)}</span>
        <select class="ff-input" data-field="${esc(name)}" onchange="onFieldSelect(this)">${optHtml}</select></div>`;
    }
    if(fk.kind==="api"){
      return`${sep}<div class="ff-group"><span class="ff-lbl">${esc(label)}</span>
        <select class="ff-input" data-field="${esc(name)}" data-api-src="${esc(JSON.stringify(fk))}"
                onchange="onFieldSelect(this)" disabled><option value="">Memuat…</option></select></div>`;
    }
    if(fk.kind==="cascade"){
      const missingDep=fk.deps.find(dep=>!FIELD_EXACT_FILTERS[dep]);
      if(missingDep){
        const depLabel=(ALL_FIELDS.find(ff=>ff.name===missingDep)||{}).label||missingDep;
        return`${sep}<div class="ff-group"><span class="ff-lbl">${esc(label)}</span>
          <select class="ff-input" data-field="${esc(name)}" disabled>
            <option value="">— pilih ${esc(depLabel)} dahulu —</option></select></div>`;
      }
      const resolvedUrl=fk.urlTpl.replace(/\{([^}]+)\}/g,(_,k)=>encodeURIComponent(FIELD_EXACT_FILTERS[k]||""));
      const src={url:resolvedUrl,valueField:fk.valueField,labelField:fk.labelField,path:fk.path};
      return`${sep}<div class="ff-group"><span class="ff-lbl">${esc(label)}</span>
        <select class="ff-input" data-field="${esc(name)}" data-api-src="${esc(JSON.stringify(src))}"
                onchange="onFieldSelect(this)" disabled><option value="">Memuat…</option></select></div>`;
    }
    const curVal=FIELD_FILTERS[name]||"";
    return`${sep}<div class="ff-group"><span class="ff-lbl">${esc(label)}</span>
      <input class="ff-input" placeholder="Filter…" value="${esc(curVal)}"
             data-field="${esc(name)}" oninput="onFieldInput(this)"></div>`;
  });
  bar.innerHTML=parts.join("");
  bar.querySelectorAll("select[data-api-src]").forEach(async sel=>{
    const src=JSON.parse(sel.dataset.apiSrc);
    const opts=await fetchApiOpts(src);
    const curVal=FIELD_EXACT_FILTERS[sel.dataset.field]||"";
    sel.innerHTML=`<option value="">Semua</option>`+
      opts.map(o=>`<option value="${esc(o.value)}"${curVal===o.value?" selected":""}>${esc(o.label)}</option>`).join("");
    sel.disabled=false;
  });
}

/* ---- field schema helper ---- */
function findField(schema,name){
  let found=null;
  function walk(comps){
    for(const c of comps||[]){
      if(c.kind==="field"&&c.name===name){found=c;return;}
      if(c.components)walk(c.components);
    }
  }
  for(const p of schema?.pages||[])if(!found)walk(p.components||[]);
  return found;
}

function getOptionLabel(c,val){
  if(c.optionsRef&&SCHEMA){
    const t=(SCHEMA.referenceData||{})[c.optionsRef];
    if(t&&t.items){const item=t.items.find(it=>String(it.code)===String(val));if(item)return txt(item.label);}
  }
  if(c.options){const opt=c.options.find(o=>String(o.value)===String(val));if(opt)return txt(opt.label)||String(val);}
  return String(val);
}

function formatFieldValue(c,val){
  if(val==null||val==="")return"";
  if(Array.isArray(val)){if(!val.length)return"";return val.map(v=>getOptionLabel(c,v)).join(", ");}
  if(c.type==="boolean")return(val==="true"||val===true)?"Ya":"Tidak";
  if(c.type==="select"||c.type==="radio")return getOptionLabel(c,val);
  return String(val);
}

function parseAnswers(raw){
  try{return typeof raw==="string"?JSON.parse(raw):(raw||{});}catch{return{};}
}

function formatDate(iso){
  if(!iso||iso==="0001-01-01T00:00:00Z")return"—";
  return new Date(iso).toLocaleString("id-ID",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
}

function sortTh(col,label,cls){
  const active=SORT_BY===col;
  const ic=active?(SORT_DIR==="asc"?"↑":"↓"):"↕";
  return`<th class="sortable${active?" sort-active":""}${cls?" "+cls:""}" onclick="toggleSort('${col}')">${label}<span class="sort-ic">${ic}</span></th>`;
}

function renderTable(){
  if(!RESPONSES.length){
    const isFiltered=FILTER_STATUS||FILTER_SEARCH||Object.keys(FIELD_FILTERS).length||Object.keys(FIELD_EXACT_FILTERS).length;
    document.getElementById("tblWrap").innerHTML=
      `<div class="empty-state">${isFiltered?"Tidak ada jawaban yang cocok dengan filter.":"Belum ada jawaban."}</div>`;
    return;
  }

  // Header kolom tambahan dari konfigurasi admin
  const extraTh=SEL_COLS.map(name=>{
    const f=ALL_FIELDS.find(ff=>ff.name===name);
    const label=f?f.label:name;
    return sortTh(name,esc(label),"td-val");
  }).join("");

  let html=`<table class="resp-tbl"><thead><tr>
    <th class="td-num">#</th>
    ${sortTh("status","Status","td-status")}
    ${sortTh("who","Responden","td-who")}
    ${sortTh("waktu","Waktu","td-time")}
    ${extraTh}
    <th></th>
  </tr></thead><tbody>`;

  RESPONSES.forEach((resp,i)=>{
    const num=PAGE*PAGE_SIZE+i+1;
    const answers=parseAnswers(resp.answers);
    const meta=parseAnswers(resp.meta);
    const who=meta.name
      ?`${esc(meta.name)}<br><span style="font-size:11px;color:var(--muted)">${esc(meta.email||"")}</span>`
      :esc(meta.email||"—");
    const waktu=formatDate(resp.submittedAt);
    const extraVals=SEL_COLS.map(name=>{
      const c=findField(SCHEMA,name);
      const raw=answers[name];
      const display=c?formatFieldValue(c,raw):txt(raw);
      return`<td class="td-val" title="${esc(display)}">${esc(display)}</td>`;
    }).join("");

    const statusBadge=resp.status==="draft"
      ?`<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;background:#fef3c7;color:#92400e">Draf</span>`
      :`<span style="font-size:10px;font-weight:700;padding:2px 7px;border-radius:999px;background:var(--ok-soft);color:var(--ok)">Terkirim</span>`;
    html+=`<tr>
      <td class="td-num">${num}</td>
      <td class="td-status">${statusBadge}</td>
      <td class="td-who">${who}</td>
      <td class="td-time">${waktu}</td>
      ${extraVals}
      <td style="white-space:nowrap"><a class="btn-sm" href="/portal-response-view?form=${encodeURIComponent(FORM_ID)}&resp=${encodeURIComponent(resp.id)}" target="_blank">Lihat</a></td>
    </tr>`;
  });

  html+=`</tbody></table>`;

  // Footer paginasi
  const totalPages=Math.ceil(TOTAL/PAGE_SIZE);
  const footer=totalPages>1?`<div class="tbl-foot">
    <div>${(PAGE*PAGE_SIZE+1)}–${Math.min((PAGE+1)*PAGE_SIZE,TOTAL)} dari ${TOTAL}</div>
    <div style="display:flex;gap:6px">
      <button class="btn-sm" onclick="loadPage(${PAGE-1})" ${PAGE===0?"disabled":""}>← Sebelumnya</button>
      <button class="btn-sm" onclick="loadPage(${PAGE+1})" ${PAGE>=totalPages-1?"disabled":""}>Berikutnya →</button>
    </div>
  </div>`:"";

  document.getElementById("tblWrap").innerHTML=html+footer;
}

init();
</script>
</body>
</html>
