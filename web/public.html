<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Kuesioner</title>
<style>
:root{
  --ink:#13171e;--ink-soft:#4a525e;--muted:#79828f;
  --surface:#eef1f5;--panel:#fff;--panel-2:#f7f9fb;
  --line:#dfe4ea;--line-2:#eef1f5;
  --accent:#0e7490;--accent-ink:#0b5563;--accent-soft:#d6edf1;
  --roster:#047857;
  --ok:#15803d;--ok-soft:#dcfce7;--bad:#b42318;--bad-soft:#fde7e4;--warn:#b45309;
  --radius:10px;--radius-s:7px;
  --shadow:0 1px 3px rgba(19,23,30,.07),0 4px 14px -6px rgba(19,23,30,.1);
  --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Inter,sans-serif;
  --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{font-family:var(--sans);color:var(--ink);background:var(--surface);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:13.5px;color:var(--ink)}

/* ---- layout ---- */
.pv{display:flex;flex-direction:column;height:100vh}
.pv-bar{display:flex;align-items:center;gap:10px;padding:11px 18px;background:var(--panel);border-bottom:1px solid var(--line);flex:none}
.pv-title{font-weight:700;font-size:15px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pv-brand{font-family:var(--mono);font-size:10.5px;color:var(--muted);flex:none;white-space:nowrap}
.pv-main{flex:1;display:flex;min-height:0}
.pv-side{width:230px;flex:none;background:var(--panel);border-right:1px solid var(--line);overflow:auto;padding:14px 12px;transition:width .2s ease,padding .2s ease}
.pv-side.collapsed{width:0;padding:0;overflow:hidden;border-right-color:transparent}
.pv-side-h{font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0 4px 10px}
.pv-side-tog{border:none;background:transparent;color:var(--ink-soft);padding:5px 8px;border-radius:6px;cursor:pointer;font-size:18px;line-height:1;flex:none;transition:background .12s}
.pv-side-tog:hover{background:var(--panel-2);color:var(--ink)}
.pv-side-bd{display:none;position:fixed;inset:0;background:rgba(19,23,30,.35);z-index:59;cursor:pointer}
.pv-pg{padding:9px 10px;border-radius:var(--radius-s);cursor:pointer;font-size:12.5px;font-weight:500;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;transition:background .1s}
.pv-pg:hover{background:var(--panel-2)}
.pv-pg.active{background:var(--accent-soft);color:var(--accent-ink);font-weight:600}
.pv-subpg{display:flex;align-items:center;gap:7px;padding:7px 10px 7px 22px;border-radius:var(--radius-s);cursor:pointer;font-size:11.5px;color:var(--ink-soft);margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pv-subpg:hover{background:var(--panel-2)}
.pv-subpg .pv-ri{color:#059669;flex:none}
.pv-subpg.active{background:#d8f3e5;color:#059669;font-weight:600}
.pv-content{flex:1;display:flex;flex-direction:column;min-height:0;min-width:0}
.pv-body{flex:1;overflow:auto;padding:28px 20px 36px}

/* ---- draft note ---- */
.pv-draft-note{display:flex;align-items:center;justify-content:space-between;gap:10px;padding:9px 18px;background:var(--accent-soft);border-bottom:1px solid #c3dfe5;font-size:12.5px;color:var(--accent-ink);flex:none}
.pv-draft-note button{border:none;background:transparent;color:var(--accent-ink);font-size:16px;line-height:1;cursor:pointer;padding:0 4px;opacity:.7}
.pv-draft-note button:hover{opacity:1}

/* ---- user bar ---- */
.pv-ubar{display:flex;align-items:center;gap:10px;max-width:660px;margin:0 auto 20px;padding:10px 14px;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius-s);box-shadow:var(--shadow)}
.pv-uavatar{width:30px;height:30px;border-radius:50%;object-fit:cover;flex:none;background:var(--accent-soft)}
.pv-uname{font-size:13px;font-weight:600;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pv-uemail{font-size:11.5px;color:var(--muted);flex:none}
.pv-ulogout{border:none;background:transparent;color:var(--muted);font-size:12px;cursor:pointer;padding:4px 8px;border-radius:5px;transition:.1s}
.pv-ulogout:hover{background:var(--panel-2);color:var(--ink)}

/* ---- page content ---- */
.pv-page{max-width:660px;margin:0 auto 10px}
.pv-h2{font-size:21px;font-weight:700;margin:0 0 20px;line-height:1.3;color:var(--ink)}
.pv-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px 22px;margin-bottom:14px}
.pv-bt{font-weight:700;font-size:15px;margin:0 0 16px;padding-bottom:11px;border-bottom:1px solid var(--line-2);color:var(--ink)}
.pv-sec{border:1px solid var(--line);border-top:3px solid var(--accent);border-radius:9px;padding:14px 16px;margin-bottom:16px;background:var(--panel-2)}
.pv-st{font-weight:700;font-size:11px;letter-spacing:.06em;text-transform:uppercase;color:var(--accent-ink);margin-bottom:14px}
.pv-field{margin-bottom:18px}
.pv-lab{display:block;font-size:13.5px;font-weight:600;margin-bottom:5px;line-height:1.4;color:var(--ink)}
.pv-req{color:var(--bad)}
.pv-hint{font-size:12px;color:var(--muted);margin-bottom:7px;line-height:1.55}
.pv-unit{font-size:12px;color:var(--muted);margin-left:6px}
.pv-in{width:100%;border:1.5px solid var(--line);border-radius:var(--radius-s);padding:10px 12px;background:var(--panel);font-size:13.5px;transition:border-color .15s,box-shadow .15s}
.pv-in:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.pv-in:disabled{background:var(--panel-2);color:var(--muted);cursor:not-allowed;border-color:var(--line)}
.pv-vmsg{font-size:11.5px;margin-top:5px}
.pv-vmsg.error{color:var(--bad)}
.pv-vmsg.warning{color:var(--warn)}
.pv-vmsg.req{color:var(--muted)}
.pv-inbtn{display:flex;gap:8px;align-items:center}
.pv-inbtn .pv-in{flex:1}
.pv-smbtn{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:8px 12px;border-radius:var(--radius-s);font-size:12.5px;font-weight:500;cursor:pointer;white-space:nowrap;flex:none;transition:.12s}
.pv-smbtn:hover:not(:disabled){border-color:#c6cdd6;background:var(--panel-2)}
.pv-smbtn:disabled{opacity:.5;cursor:not-allowed}
.pv-geomsg{font-size:11.5px;color:var(--muted);margin-top:5px}
.pv-geomsg.error{color:var(--bad)}
.pv-sigwrap{display:flex;flex-direction:column;gap:8px}
.pv-sigpad{width:100%;max-width:400px;height:140px;border:1.5px solid var(--line);border-radius:var(--radius-s);background:#fafcff;touch-action:none;cursor:crosshair}
.pv-sigpad[data-disabled="1"]{cursor:not-allowed;opacity:.6}
.pv-sigactions{display:flex}
.pv-photowrap{display:flex;flex-direction:column;gap:8px}
.pv-photolabel{display:inline-flex;align-items:center;gap:6px;cursor:pointer;background:var(--panel);border:1.5px dashed var(--line);border-radius:var(--radius-s);padding:10px 16px;font-size:13px;font-weight:500;color:var(--ink-soft);transition:.12s;user-select:none}
.pv-photolabel:hover:not(.pv-photolabel-dis){border-color:var(--accent);background:var(--accent-soft);color:var(--ink)}
.pv-photolabel.pv-photolabel-dis{opacity:.5;cursor:not-allowed}
.pv-photofile{display:none}
.pv-photopreview{display:flex;align-items:flex-start;gap:10px;flex-wrap:wrap}
.pv-photoimg{max-width:240px;max-height:180px;border-radius:var(--radius-s);border:1.5px solid var(--line);object-fit:cover;display:block}
.pv-scanmodal video{width:100%;max-width:340px;border-radius:var(--radius-s);background:#000;margin-bottom:14px}
.pv-field-err{outline:2px solid var(--bad);outline-offset:4px;border-radius:8px;transition:outline-color .2s}
textarea.pv-in{width:100%;resize:vertical;min-height:72px}
.pv-md{line-height:1.65}.pv-md h1,.pv-md h2,.pv-md h3,.pv-md h4{margin:.4em 0 .3em;line-height:1.25}
.pv-md h1{font-size:1.4em}.pv-md h2{font-size:1.2em}.pv-md h3{font-size:1.05em}
.pv-md p{margin:.5em 0}.pv-md ul,.pv-md ol{padding-left:1.4em;margin:.4em 0}.pv-md li{margin:.15em 0}
.pv-md blockquote{border-left:3px solid var(--accent);margin:.5em 0;padding:.3em .9em;color:var(--ink-soft);background:rgba(0,0,0,.02)}
.pv-md code{font-family:var(--mono);font-size:.9em;background:rgba(0,0,0,.06);padding:1px 5px;border-radius:4px}
.pv-md hr{border:none;border-top:1px solid var(--line);margin:.8em 0}
.pv-md a{color:var(--accent)}
.pv-radios{display:flex;flex-direction:column;gap:2px}
.pv-opt{display:flex;align-items:center;gap:10px;font-size:13.5px;padding:7px 9px;border-radius:7px;cursor:pointer;margin:0 -5px;transition:background .1s}
.pv-opt:hover{background:var(--panel-2)}
.pv-opt input[type=radio],.pv-opt input[type=checkbox]{width:16px;height:16px;accent-color:var(--accent);flex:none;cursor:pointer}
.pv-note{background:linear-gradient(135deg,var(--accent-soft),#ecf7f9);border:1px solid #c3dfe5;border-left:3px solid var(--accent);border-radius:8px;padding:12px 14px;margin-bottom:16px;font-size:13px;line-height:1.55}
.pv-loading{font-size:12.5px;color:var(--muted);padding:9px 11px;border:1px dashed var(--line);border-radius:7px;background:var(--panel-2)}

/* ---- roster row page header ---- */
.pv-rrow-hdr{max-width:660px;margin:0 auto 18px;background:linear-gradient(135deg,var(--accent) 0%,#0891b2 100%);border-radius:var(--radius);padding:16px 20px 18px;color:#fff}
.pv-rrow-bread{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.pv-rrow-back{border:none;background:rgba(255,255,255,.18);color:#fff;font-size:12px;font-weight:600;cursor:pointer;padding:3px 10px;border-radius:20px;font-family:inherit;transition:background .12s}
.pv-rrow-back:hover{background:rgba(255,255,255,.3)}
.pv-rrow-sep{font-size:12px;opacity:.5}
.pv-rrow-rname{font-size:12px;opacity:.75;font-weight:500;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pv-rrow-num{font-size:11px;font-weight:700;background:rgba(255,255,255,.2);padding:3px 10px;border-radius:20px;letter-spacing:.03em;flex:none}
.pv-rrow-title{font-size:18px;font-weight:700;line-height:1.3;color:#fff}

/* ---- roster ---- */
.pv-roster{border:1.5px solid #b5dfc7;border-radius:10px;padding:16px;margin-bottom:16px;background:#f4fcf8}
.pv-rh{font-weight:700;font-size:13.5px;color:var(--roster);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.pv-tag{font-family:var(--mono);font-size:9.5px;background:#d8f3e5;padding:2px 6px;border-radius:4px;color:var(--roster);font-weight:600;vertical-align:middle}
.pv-rowempty{font-size:12px;color:var(--muted);padding:4px 0 10px}
.pv-rowlist{display:flex;flex-direction:column;gap:8px;margin-bottom:12px}
.pv-rowitem{display:flex;align-items:center;gap:10px;border:1px solid #d8eedf;border-radius:8px;background:var(--panel);padding:11px 14px;transition:border-color .1s}
.pv-rowitem:hover{border-color:#99d4b4}
.pv-rowinfo{flex:1;min-width:0}
.pv-rowinfo b{font-size:13px;font-weight:600;display:block}
.pv-rowinfo span{font-size:12px;color:var(--ink-soft);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;display:block;margin-top:2px}
.pv-rowinfo i{color:var(--muted)}
.pv-rowopen{border:1px solid var(--roster);background:var(--panel);color:var(--roster);border-radius:6px;padding:7px 13px;font-weight:600;font-size:12px;cursor:pointer;flex:none;transition:.1s}
.pv-rowopen:hover{background:#edfaf4}
.pv-rowdel{border:none;background:transparent;color:var(--bad);font-size:11.5px;cursor:pointer;flex:none;padding:4px 7px;border-radius:5px;transition:.1s}
.pv-rowdel:hover{background:var(--bad-soft)}
.pv-row{border:1px solid #dceee4;border-radius:8px;background:var(--panel);padding:14px 16px;margin-bottom:10px}
.pv-rownum{font-size:12px;font-weight:600;color:var(--ink-soft);margin-bottom:12px;display:flex;justify-content:space-between;align-items:center}
.pv-del{border:none;background:transparent;color:var(--bad);font-size:11.5px;cursor:pointer;padding:3px 6px;border-radius:5px;transition:.1s}
.pv-del:hover{background:var(--bad-soft)}
.pv-add{border:1.5px dashed #7cc9a0;background:transparent;color:var(--roster);border-radius:8px;padding:10px;width:100%;font-weight:600;font-size:13px;cursor:pointer;transition:.15s}
.pv-add:hover{background:#edfaf4;border-color:#47b077;border-style:solid}

/* ---- save draft button ---- */
.pv-savedraft{border:1px solid var(--line);background:var(--panel);color:var(--ink);border-radius:var(--radius-s);padding:8px 14px;font-size:13px;font-weight:500;cursor:pointer;transition:.12s;white-space:nowrap}
.pv-savedraft:hover:not(:disabled){border-color:#c6cdd6;background:var(--panel-2)}
.pv-savedraft:disabled{opacity:.5;cursor:not-allowed}
.pv-savedraft.saved{border-color:var(--ok);color:var(--ok);background:var(--ok-soft)}

/* ---- modal ---- */
.pv-modal-bg{position:fixed;inset:0;background:rgba(19,23,30,.5);display:flex;align-items:center;justify-content:center;z-index:80;backdrop-filter:blur(2px)}
.pv-modal{background:var(--panel);border-radius:var(--radius);padding:24px;max-width:400px;width:92%;box-shadow:0 8px 40px -8px rgba(19,23,30,.3)}
.pv-modal h3{margin:0 0 4px;font-size:16px;font-weight:700}
.pv-modal .pv-modal-sub{font-size:12.5px;color:var(--muted);margin:0 0 14px}
.pv-modal input,.pv-modal-in{width:100%;border:1.5px solid var(--line);border-radius:var(--radius-s);padding:10px 11px;font-size:13px;margin-bottom:12px;box-sizing:border-box;transition:border-color .15s,box-shadow .15s;font-family:inherit;color:var(--ink)}
.pv-modal input:focus,.pv-modal-in:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}
.pv-modal-actions{display:flex;justify-content:flex-end;gap:8px}

/* ---- navigation footer ---- */
.pv-nav-area{flex:none;background:var(--panel);border-top:1px solid var(--line);padding:0 20px 4px;box-shadow:0 -2px 16px rgba(19,23,30,.06)}
.pv-nav{max-width:660px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;gap:10px;padding:12px 0 14px}
.pv-nav-err{max-width:660px;margin:0 auto;font-size:12.5px;text-align:center;color:var(--bad);padding:8px 0 0;min-height:0}
.pv-prog{font-size:12.5px;color:var(--muted);font-weight:500}
.msg{max-width:660px;margin:10px auto 0;padding:13px 16px;border-radius:9px;font-size:13.5px;font-weight:500;display:none}
.msg.ok{background:var(--ok-soft);color:var(--ok);display:block;border:1px solid #a3e5b6}
.msg.err{background:var(--bad-soft);color:var(--bad);display:block;border:1px solid #f3b8b0}
.view-hint{max-width:660px;margin:10px auto 0;font-size:13px;color:var(--muted);padding:11px 14px;background:var(--panel-2);border:1px solid var(--line);border-radius:var(--radius-s)}
.foot{text-align:center;color:var(--muted);font-family:var(--mono);font-size:10.5px;letter-spacing:.03em;padding:20px 0 6px}

/* ---- buttons ---- */
.btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:8px 16px;border-radius:var(--radius-s);font-size:13px;font-weight:500;transition:.12s;cursor:pointer}
.btn:hover{border-color:#c6cdd6;background:var(--panel-2)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff;font-weight:700;padding:10px 24px;border-radius:var(--radius-s)}
.btn.primary:hover{background:var(--accent-ink);border-color:var(--accent-ink)}
.btn.primary:disabled{opacity:.6;cursor:default}
.btn.ghost{border-color:transparent;background:transparent;color:var(--ink-soft)}
.btn.ghost:hover{background:var(--panel-2)}

/* ---- login gate ---- */
.gate-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--surface)}
.gate-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:34px 30px;max-width:400px;width:92%;text-align:center;box-shadow:0 2px 4px rgba(19,23,30,.06),0 12px 40px -16px rgba(19,23,30,.2)}
.gate-icon{font-size:38px;margin-bottom:14px}
.gate-title{font-size:18px;font-weight:700;margin:0 0 6px}
.gate-sub{font-size:13.5px;color:var(--muted);margin:0 0 22px;line-height:1.55}
.gate-form{font-size:13px;font-weight:600;color:var(--accent);margin-bottom:18px;display:block}
.google-btn{display:inline-flex;align-items:center;gap:10px;border:1.5px solid var(--line);background:var(--panel);padding:11px 22px;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;width:100%;justify-content:center;transition:.12s}
.google-btn:hover{border-color:#c6cdd6;background:var(--panel-2)}
.google-btn svg{flex:none}
.gate-err{margin-top:12px;font-size:12.5px;color:var(--bad)}

/* ---- init / password gate ---- */
.init-wrap{display:flex;align-items:center;justify-content:center;height:100vh;background:var(--surface)}
.init-msg{font-size:13px;color:var(--muted)}
.pw-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:26px;max-width:340px;width:90%;text-align:center;box-shadow:var(--shadow)}
.pw-card h3{margin:0 0 6px;font-size:16px;font-weight:700}
.pw-card .pw-sub{font-size:13px;color:var(--muted);margin:0 0 16px;line-height:1.5}
.pw-card input{width:100%;border:1.5px solid var(--line);border-radius:var(--radius-s);padding:10px 12px;font-size:13.5px;margin-bottom:10px;transition:border-color .15s}
.pw-card input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-soft)}

.pv-prog-wrap{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;padding:0 18px}
.pv-progbar-track{width:100%;height:4px;background:var(--line);border-radius:4px;overflow:hidden}
.pv-progbar{height:100%;background:var(--accent);border-radius:4px;transition:width .35s ease}
.pv-prog-wrap .pv-prog{font-size:11.5px;color:var(--muted);font-weight:500}

/* ---- error summary ---- */
.pv-err-head{text-align:center;padding:4px 0 24px}
.pv-err-icon{font-size:38px;margin-bottom:12px}
.pv-err-sub{font-size:13.5px;color:var(--muted);margin:0;line-height:1.5}
.pv-err-list{display:flex;flex-direction:column;gap:10px}
.pv-err-item{display:flex;align-items:center;gap:14px;background:var(--panel);border:1px solid var(--line);border-left:3px solid var(--bad);border-radius:9px;padding:13px 16px;transition:border-color .1s}
.pv-err-item:hover{border-color:#f3b8b0}
.pv-err-info{flex:1;min-width:0;display:flex;flex-direction:column;gap:3px}
.pv-err-page{font-size:10.5px;font-family:var(--mono);color:var(--muted);text-transform:uppercase;letter-spacing:.04em}
.pv-err-lbl{font-size:13.5px;font-weight:600;color:var(--ink)}
.pv-err-msg{font-size:12px;color:var(--bad)}
.pv-err-fix{flex:none;border:1px solid var(--bad);background:var(--bad-soft);color:var(--bad);border-radius:6px;padding:8px 14px;font-size:12.5px;font-weight:600;cursor:pointer;white-space:nowrap;transition:.12s;font-family:inherit}
.pv-err-fix:hover{background:var(--bad);color:#fff}

@media(max-width:700px){
  .pv-side{position:fixed;inset:0 auto 0 0;z-index:60;width:260px;padding:14px 12px;overflow:auto;transform:translateX(-100%);transition:transform .22s ease;box-shadow:none;border-right:1px solid var(--line)}
  .pv-side.open{transform:translateX(0);box-shadow:4px 0 24px rgba(19,23,30,.18)}
  .pv-side.collapsed{width:260px!important;padding:14px 12px!important;overflow:auto!important;transform:translateX(-100%)}
  .pv-side-bd.show{display:block}
  .pv-body{padding:18px 14px 60px}
  .pv-card{padding:16px}
  .pv-nav{padding:11px 0 14px}
}
</style>
</head>
<body>
<div id="root"><div class="init-wrap"><span class="init-msg">Memuat kuesioner…</span></div></div>
<script>
const SHARE_TOKEN=location.pathname.split("/").filter(Boolean).pop();
const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const txt=v=>v==null?"":(typeof v==="object"?(v.id||Object.values(v)[0]||""):v);

let SCHEMA=null, ALLOW=true, PW="", apiCache={};
let PAGES=[], curPage=0, answers={};
let rosterView=null;
let RESP_TOKEN=localStorage.getItem("eform_resp_token")||"";
let RESP_USER=null;
let EXISTING_RESPONSE=null; // respons yang pernah dikirim responden
let DRAFT_RESTORED_AT=null; // timestamp draf lokal yang sedang dipakai (null jika tidak ada)

/* ---- draft/autosave lokal: simpan progres pengisian di localStorage agar
   tidak hilang kalau tab tertutup / koneksi putus sebelum sempat "Kirim". ---- */
function draftKey(){return RESP_USER?`eform_draft_${SHARE_TOKEN}_${RESP_USER.id}`:null;}
function saveDraft(){
  const key=draftKey();if(!key)return;
  try{localStorage.setItem(key,JSON.stringify({answers,curPage,savedAt:new Date().toISOString()}));}catch(_){}
}
function loadDraft(){
  const key=draftKey();if(!key)return null;
  try{const raw=localStorage.getItem(key);if(!raw)return null;return JSON.parse(raw);}catch(_){return null;}
}
function clearDraft(){
  const key=draftKey();if(!key)return;
  try{localStorage.removeItem(key);}catch(_){}
}

/* ---- mesin ekspresi (visibleWhen/enableWhen/requiredWhen/validations/calculate/skip) ---- */
const Expr=(function(){
  const FUNCS=new Set(["isempty","notempty","len","count","sum","avg","min","max","in","today","age","regex","if","number","round","abs","floor","ceil","contains","upper","lower","trim"]);
  function tokenize(src){
    const t=[];let i=0;const n=src.length;const id=c=>/[A-Za-z0-9_]/.test(c);
    while(i<n){let c=src[i];
      if(c===" "||c==="\t"||c==="\n"||c==="\r"){i++;continue;}
      if(c==="$"&&src[i+1]==="{"){let j=i+2,s="";while(j<n&&src[j]!=="}")s+=src[j++];if(src[j]!=="}")throw new Error("${ } tidak ditutup");i=j+1;t.push({t:"ref",v:s.trim()});continue;}
      if(c==="'"||c==='"'){const q=c;let j=i+1,s="";while(j<n&&src[j]!==q){if(src[j]==="\\"){s+=src[j+1];j+=2;}else s+=src[j++];}if(src[j]!==q)throw new Error("teks tidak ditutup");i=j+1;t.push({t:"str",v:s});continue;}
      if((c>="0"&&c<="9")||(c==="."&&src[i+1]>="0"&&src[i+1]<="9")){let j=i,s="";while(j<n&&((src[j]>="0"&&src[j]<="9")||src[j]===".")){s+=src[j++];}i=j;t.push({t:"num",v:parseFloat(s)});continue;}
      if(/[A-Za-z_]/.test(c)){let j=i,s="";while(j<n&&id(src[j]))s+=src[j++];i=j;
        if(s==="true")t.push({t:"bool",v:true});else if(s==="false")t.push({t:"bool",v:false});else if(s==="null")t.push({t:"null"});else t.push({t:"id",v:s});continue;}
      const two=src.substr(i,2);
      if(["==","!=","<=",">=","&&","||"].includes(two)){t.push({t:"op",v:two});i+=2;continue;}
      if("+-*/%<>!".includes(c)){t.push({t:"op",v:c});i++;continue;}
      if(c==="("){t.push({t:"lp"});i++;continue;}
      if(c===")"){t.push({t:"rp"});i++;continue;}
      if(c==="["){t.push({t:"lb"});i++;continue;}
      if(c==="]"){t.push({t:"rb"});i++;continue;}
      if(c===","){t.push({t:"comma"});i++;continue;}
      throw new Error("karakter tak dikenal: "+c);
    }
    return t;
  }
  function parse(src){
    const toks=tokenize(src);let p=0;
    const peek=()=>toks[p],next=()=>toks[p++];
    const expect=k=>{if(!toks[p]||toks[p].t!==k)throw new Error("diharapkan '"+k+"'");return toks[p++];};
    function or(){let l=and();while(peek()&&peek().t==="op"&&peek().v==="||"){next();l={type:"bin",op:"||",l,r:and()};}return l;}
    function and(){let l=eq();while(peek()&&peek().t==="op"&&peek().v==="&&"){next();l={type:"bin",op:"&&",l,r:eq()};}return l;}
    function eq(){let l=cmp();while(peek()&&peek().t==="op"&&(peek().v==="=="||peek().v==="!=")){const o=next().v;l={type:"bin",op:o,l,r:cmp()};}return l;}
    function cmp(){let l=add();while(peek()&&peek().t==="op"&&["<","<=",">",">="].includes(peek().v)){const o=next().v;l={type:"bin",op:o,l,r:add()};}return l;}
    function add(){let l=mul();while(peek()&&peek().t==="op"&&(peek().v==="+"||peek().v==="-")){const o=next().v;l={type:"bin",op:o,l,r:mul()};}return l;}
    function mul(){let l=un();while(peek()&&peek().t==="op"&&["*","/","%"].includes(peek().v)){const o=next().v;l={type:"bin",op:o,l,r:un()};}return l;}
    function un(){if(peek()&&peek().t==="op"&&(peek().v==="!"||peek().v==="-")){const o=next().v;return {type:"un",op:o,e:un()};}return prim();}
    function prim(){const k=peek();if(!k)throw new Error("ekspresi terpotong");
      if(k.t==="num"||k.t==="str"||k.t==="bool"){next();return {type:"lit",v:k.v};}
      if(k.t==="null"){next();return {type:"lit",v:null};}
      if(k.t==="ref"){next();return {type:"ref",name:k.v};}
      if(k.t==="lp"){next();const e=or();expect("rp");return e;}
      if(k.t==="lb"){next();const items=[];if(peek()&&peek().t!=="rb"){items.push(or());while(peek()&&peek().t==="comma"){next();items.push(or());}}expect("rb");return {type:"arr",items};}
      if(k.t==="id"){next();
        if(peek()&&peek().t==="lp"){const fn=k.v.toLowerCase();if(!FUNCS.has(fn))throw new Error("fungsi tak dikenal: "+k.v);next();const args=[];if(peek()&&peek().t!=="rp"){args.push(or());while(peek()&&peek().t==="comma"){next();args.push(or());}}expect("rp");return {type:"call",fn,args};}
        throw new Error("pakai ${...} untuk merujuk field, bukan '"+k.v+"'");}
      throw new Error("token tak terduga");
    }
    const ast=or();if(p<toks.length)throw new Error("ada token sisa di akhir");return ast;
  }
  const toNum=v=>v===true?1:v===false?0:(v==null||v==="")?NaN:Number(v);
  const isEmp=x=>x==null||x===""||(Array.isArray(x)&&x.length===0);
  const flat=a=>{const o=[];a.forEach(x=>Array.isArray(x)?x.forEach(y=>o.push(y)):o.push(x));return o;};
  const nums=a=>flat(a).map(Number).filter(x=>!isNaN(x));
  const LIB={
    isempty:a=>isEmp(a[0]),notempty:a=>!isEmp(a[0]),
    len:a=>{const x=a[0];return Array.isArray(x)?x.length:(x==null?0:String(x).length);},
    count:a=>{const arr=Array.isArray(a[0])?a[0]:a;return arr.filter(x=>!isEmp(x)).length;},
    sum:a=>flat(a).reduce((s,x)=>s+(isEmp(x)?0:(Number(x)||0)),0),
    avg:a=>{const f=nums(a);return f.length?f.reduce((s,x)=>s+x,0)/f.length:0;},
    min:a=>{const f=nums(a);return f.length?Math.min(...f):0;},
    max:a=>{const f=nums(a);return f.length?Math.max(...f):0;},
    in:a=>{const x=a[0];const rest=a.length===2&&Array.isArray(a[1])?a[1]:a.slice(1);return rest.map(String).includes(String(x));},
    today:()=>new Date().toISOString().slice(0,10),
    age:a=>{const d=new Date(a[0]);if(isNaN(d))return NaN;const t=new Date();let g=t.getFullYear()-d.getFullYear();const m=t.getMonth()-d.getMonth();if(m<0||(m===0&&t.getDate()<d.getDate()))g--;return g;},
    regex:a=>{try{return new RegExp(a[1]).test(String(a[0]??""));}catch(_){return false;}},
    if:a=>a[0]?a[1]:a[2],
    number:a=>{const x=Number(a[0]);return isNaN(x)?0:x;},
    round:a=>{const f=Math.pow(10,a[1]||0);return Math.round((Number(a[0])||0)*f)/f;},
    abs:a=>Math.abs(Number(a[0])||0),floor:a=>Math.floor(Number(a[0])||0),ceil:a=>Math.ceil(Number(a[0])||0),
    contains:a=>{const h=a[0];return Array.isArray(h)?h.map(String).includes(String(a[1])):String(h??"").includes(String(a[1]));},
    upper:a=>String(a[0]??"").toUpperCase(),lower:a=>String(a[0]??"").toLowerCase(),trim:a=>String(a[0]??"").trim()
  };
  function eqv(a,b){if(typeof a==="number"||typeof b==="number"){const x=toNum(a),y=toNum(b);if(!isNaN(x)&&!isNaN(y))return x===y;}if(typeof a==="boolean"||typeof b==="boolean")return Boolean(a)===Boolean(b);if(a==null||b==null)return a==null&&b==null;return String(a)===String(b);}
  function ev(n,res){switch(n.type){
    case "lit":return n.v;
    case "ref":return res(n.name);
    case "arr":return n.items.map(x=>ev(x,res));
    case "un":{const v=ev(n.e,res);return n.op==="!"?!v:-toNum(v);}
    case "call":return LIB[n.fn](n.args.map(a=>ev(a,res)));
    case "bin":{const op=n.op;
      if(op==="&&")return !!ev(n.l,res)&&!!ev(n.r,res);
      if(op==="||")return !!ev(n.l,res)||!!ev(n.r,res);
      const a=ev(n.l,res),b=ev(n.r,res);
      switch(op){case "+":return toNum(a)+toNum(b);case "-":return toNum(a)-toNum(b);case "*":return toNum(a)*toNum(b);case "/":return toNum(a)/toNum(b);case "%":return toNum(a)%toNum(b);
        case "<":return toNum(a)<toNum(b);case "<=":return toNum(a)<=toNum(b);case ">":return toNum(a)>toNum(b);case ">=":return toNum(a)>=toNum(b);
        case "==":return eqv(a,b);case "!=":return !eqv(a,b);}}
  }}
  const cache=new Map();
  function parseCached(src){if(cache.has(src))return cache.get(src);const a=parse(src);cache.set(src,a);return a;}
  return {
    parse,
    evalSrc(src,res){if(!src)return undefined;let a;try{a=parseCached(src);}catch(_){return undefined;}try{return ev(a,res);}catch(_){return undefined;}}
  };
})();
function coerceVal(v){if(v==="true")return true;if(v==="false")return false;if(typeof v==="string"&&v.trim()!==""&&!isNaN(Number(v)))return Number(v);return v;}
function refResolve(name,rowPrefix){
  name=String(name).trim();
  if(name.includes(".")){
    const dot=name.indexOf(".");const rn=name.slice(0,dot),fn=name.slice(dot+1);
    const r=findRoster(rn);
    if(r){const cnt=rosterCount(r);const arr=[];for(let i=0;i<cnt;i++)arr.push(coerceVal(answers[`${rn}#${i}#${fn}`]));return arr;}
    // Bukan notasi roster.field — nama field biasa yang kebetulan mengandung titik
    if(rowPrefix){const k=rowPrefix+name;if(k in answers)return coerceVal(answers[k]);}
    return name in answers?coerceVal(answers[name]):undefined;
  }
  const rn=findRoster(name);
  if(rn){const cnt=rosterCount(rn);return Array.from({length:cnt},(_,i)=>i);}
  if(rowPrefix){const k=rowPrefix+name;if(k in answers)return coerceVal(answers[k]);}
  return coerceVal(answers[name]);
}
function evalExprSrc(src,rowPrefix){return Expr.evalSrc(src,name=>refResolve(name,rowPrefix||""));}
function evalVisible(src,rowPrefix){if(!src)return true;const v=evalExprSrc(src,rowPrefix||"");return v===undefined?true:!!v;}

/* ---- headers helper ---- */
function pubHeaders(extra){
  const h={...extra};
  if(PW)h["X-Share-Password"]=PW;
  if(RESP_TOKEN)h["Authorization"]="Bearer "+RESP_TOKEN;
  return h;
}

/* ---- markdown ---- */
function mdToHtml(src){
  if(!src)return"";
  const e=s=>s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");
  const inl=s=>e(s).replace(/`([^`]+)`/g,"<code>$1</code>").replace(/\*\*([^*]+)\*\*/g,"<strong>$1</strong>").replace(/(^|[^*])\*([^*]+)\*/g,"$1<em>$2</em>").replace(/\[([^\]]+)\]\(([^)]+)\)/g,'<a href="$2" target="_blank" rel="noopener">$1</a>');
  const L=String(src).replace(/\r\n/g,"\n").split("\n");let h="",i=0;
  while(i<L.length){const l=L[i];
    let m=l.match(/^\s*(#{1,6})\s+(.*)$/);if(m){h+=`<h${m[1].length}>${inl(m[2])}</h${m[1].length}>`;i++;continue;}
    if(/^\s*[-*]\s+/.test(l)){const it=[];while(i<L.length&&/^\s*[-*]\s+/.test(L[i])){it.push(`<li>${inl(L[i].replace(/^\s*[-*]\s+/,""))}</li>`);i++;}h+=`<ul>${it.join("")}</ul>`;continue;}
    if(/^\s*\d+\.\s+/.test(l)){const it=[];while(i<L.length&&/^\s*\d+\.\s+/.test(L[i])){it.push(`<li>${inl(L[i].replace(/^\s*\d+\.\s+/,""))}</li>`);i++;}h+=`<ol>${it.join("")}</ol>`;continue;}
    if(/^\s*>\s?/.test(l)){const q=[];while(i<L.length&&/^\s*>\s?/.test(L[i])){q.push(inl(L[i].replace(/^\s*>\s?/,"")));i++;}h+=`<blockquote>${q.join("<br>")}</blockquote>`;continue;}
    if(/^\s*(-{3,}|\*{3,})\s*$/.test(l)){h+="<hr>";i++;continue;}
    if(/^\s*$/.test(l)){i++;continue;}
    const para=[];while(i<L.length&&!/^\s*$/.test(L[i])&&!/^\s*(#{1,6}\s|[-*]\s|\d+\.\s|>\s?|-{3,}|\*{3,})/.test(L[i])){para.push(inl(L[i]));i++;}
    h+=`<p>${para.join("<br>")}</p>`;
  }
  return h;
}

/* ---- fetch form ---- */
async function fetchForm(){
  const headers=PW?{"X-Share-Password":PW}:{};
  const r=await fetch("/api/public/forms/"+encodeURIComponent(SHARE_TOKEN),{headers});
  const data=await r.json();
  if(r.status===401){askPassword(data.error);return;}
  if(!r.ok)throw new Error(data.error||"Gagal memuat");
  SCHEMA=data.schema; ALLOW=data.allowResponses;

  // Jika Google belum dikonfigurasi, tampilkan pesan
  if(!data.googleEnabled){
    setRoot(`<div class="init-wrap"><div class="pw-card"><div class="msg err" style="display:block">Login Google belum dikonfigurasi oleh administrator.</div></div></div>`);
    return;
  }

  // Jika belum login → tampilkan gate login
  if(!RESP_TOKEN){
    renderLoginGate(data);
    return;
  }

  // Verifikasi token dengan server
  const meR=await fetch("/api/public/me",{headers:{"Authorization":"Bearer "+RESP_TOKEN}});
  if(!meR.ok){
    // Token expired/invalid → hapus dan minta login ulang
    clearRespSession();
    renderLoginGate(data);
    return;
  }
  RESP_USER=await meR.json();
  localStorage.setItem("eform_resp_user",JSON.stringify(RESP_USER));

  // Coba muat jawaban lama
  EXISTING_RESPONSE=await fetchMyResponse();
  if(EXISTING_RESPONSE){
    answers=parseAnswers(EXISTING_RESPONSE.answers);
  }

  // Pilih sumber data terbaru: jawaban final, draf server, atau draf lokal
  let restorePage=null;
  const serverTime=EXISTING_RESPONSE?new Date(EXISTING_RESPONSE.submittedAt):null;

  // Draf server
  const serverDraft=await fetchMyDraft();
  const serverDraftTime=serverDraft?new Date(serverDraft.savedAt):null;

  // Draf lokal
  const localDraft=loadDraft();
  const localDraftTime=localDraft&&localDraft.savedAt?new Date(localDraft.savedAt):null;

  // Tentukan draf mana yang dipakai (lebih baru dari jawaban final)
  const useServerDraft=serverDraftTime&&(!serverTime||serverDraftTime>serverTime)&&(!localDraftTime||serverDraftTime>=localDraftTime);
  const useLocalDraft=!useServerDraft&&localDraftTime&&localDraft.answers&&Object.keys(localDraft.answers).length&&(!serverTime||localDraftTime>serverTime);

  if(useServerDraft){
    answers=parseAnswers(serverDraft.answers);
    restorePage=serverDraft.curPage||0;
    DRAFT_RESTORED_AT=serverDraft.savedAt;
    clearDraft(); // sinkronkan lokal dengan server
  }else if(useLocalDraft){
    answers=localDraft.answers;
    restorePage=localDraft.curPage||0;
    DRAFT_RESTORED_AT=localDraft.savedAt||null;
  }else{
    clearDraft();
  }

  render(data);
  if(restorePage!=null)goToPage(restorePage);
}

function parseAnswers(raw){
  if(typeof raw==="object"&&raw!==null)return raw;
  try{return JSON.parse(raw)||{};}catch{return{};}
}
function formatDraftTime(iso){
  try{return new Date(iso).toLocaleString("id-ID",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"});}catch(_){return"";}
}

async function fetchMyResponse(){
  try{
    const r=await fetch("/api/public/forms/"+encodeURIComponent(SHARE_TOKEN)+"/my-response",
      {headers:pubHeaders({})});
    if(!r.ok)return null;
    const d=await r.json();
    return d; // null jika belum pernah mengisi
  }catch{return null;}
}

async function fetchMyDraft(){
  try{
    const r=await fetch("/api/public/forms/"+encodeURIComponent(SHARE_TOKEN)+"/draft",
      {headers:pubHeaders({})});
    if(!r.ok)return null;
    return await r.json(); // null jika belum ada draf
  }catch{return null;}
}

async function saveDraftToServer(){
  const btn=document.getElementById("pvSaveDraft");
  if(btn){btn.disabled=true;btn.textContent="Menyimpan…";}
  saveAnswers();
  const ans=collectAll();
  try{
    const r=await fetch("/api/public/forms/"+encodeURIComponent(SHARE_TOKEN)+"/draft",{
      method:"POST",
      headers:pubHeaders({"Content-Type":"application/json"}),
      body:JSON.stringify({answers:ans,curPage})
    });
    if(!r.ok)throw new Error("Gagal menyimpan draf");
    const d=await r.json();
    saveDraft(); // perbarui draf lokal juga
    if(btn){btn.className="pv-savedraft saved";btn.textContent="✓ Tersimpan "+formatDraftTime(d.savedAt);setTimeout(()=>{if(btn){btn.className="pv-savedraft";btn.textContent="Simpan Draf";btn.disabled=false;}},3000);}
  }catch(e){
    if(btn){btn.disabled=false;btn.textContent="Simpan Draf";}
    const err=document.getElementById("pvNavErr");if(err){err.textContent=e.message;setTimeout(()=>{err.textContent="";},3000);}
  }
}

function clearRespSession(){
  RESP_TOKEN="";
  RESP_USER=null;
  localStorage.removeItem("eform_resp_token");
  localStorage.removeItem("eform_resp_user");
}

function setRoot(html){document.getElementById("root").innerHTML=html;}
function askPassword(msg){
  setRoot(`<div class="init-wrap"><div class="pw-card"><h3>Kuesioner terkunci</h3><p class="pw-sub">${esc(msg||"Masukkan password untuk membuka kuesioner")}</p><input id="pw" type="password" placeholder="Password…"><button class="btn primary" id="pwbtn" style="width:100%">Buka</button></div></div>`);
  document.getElementById("pwbtn").onclick=()=>{PW=document.getElementById("pw").value;setRoot('<div class="init-wrap"><span class="init-msg">Memuat…</span></div>');fetchForm().catch(e=>showErr(e.message));};
}
function showErr(m){setRoot(`<div class="init-wrap"><div class="pw-card"><div class="msg err" style="display:block">${esc(m)}</div></div></div>`);}

/* ---- options ---- */
function getPath(o,p){return String(p).split(".").reduce((x,k)=>x==null?x:x[k],o);}
async function optionsFor(c,rp){
  rp=rp||"";
  if(c.optionsApi&&c.optionsApi.url){
    // Cari nilai dep: roster-prefixed dahulu, fallback ke field halaman
    const url=c.optionsApi.url.replace(/\{([^}]+)\}/g,(_,k)=>encodeURIComponent((rp?(answers[rp+k]??answers[k]):answers[k])??''));
    if(apiCache[url])return apiCache[url];
    try{const r=await fetch(url);const d=await r.json();
      let arr=c.optionsApi.path?getPath(d,c.optionsApi.path):(Array.isArray(d)?d:(d.data||d.items||d.results||[]));
      const vf=c.optionsApi.valueField||"code",lf=c.optionsApi.labelField||"label";
      const opts=(arr||[]).map(it=>({value:it[vf],label:txt(it[lf])||String(it[vf])}));
      apiCache[url]=opts;return opts;
    }catch(e){return[];}
  }
  if(c.optionsRef){const t=(SCHEMA.referenceData||{})[c.optionsRef];
    if(t&&t.items)return t.items.map(it=>({value:it.code,label:txt(it.label)}));return[];}
  return(c.options||[]).map(o=>({value:o.value,label:txt(o.label)||String(o.value)}));
}

/* ---- field & node rendering ---- */
const NUMER=new Set(["number","integer","decimal","currency","range","rating"]);
const CHOICE=new Set(["select","multiselect","radio","checkbox"]);
let pending=[];

function pvEmpty(v){return v==null||v===""||(Array.isArray(v)&&v.length===0);}
function fieldHtml(c,rp){

function nodeHtml(c,rp){
  rp=rp||"";
  if(c.kind==="block"){
    if(!evalVisible(c.visibleWhen,rp))return"";
    const inner=(c.components||[]).map(x=>nodeHtml(x,rp)).join("");
    if(!inner)return"";
    return`<div class="pv-card">${c.title?`<div class="pv-bt">${esc(rowInterp(txt(c.title),rp))}</div>`:""}${inner}</div>`;
  }
  if(c.kind==="section"){
    if(!evalVisible(c.visibleWhen,rp))return"";

    return`<div class="pv-sec">${c.title?`<div class="pv-st">${esc(rowInterp(txt(c.title),rp))}</div>`:""}${inner}</div>`;
  }
  if(c.kind==="roster"){
    if(!evalVisible(c.visibleWhen,rp))return"";

/* ---- roster ---- */
function rosterCount(r){
  if(r.countFrom){
    let cf=Math.floor(Number(answers[r.countFrom]));
    if(!Number.isFinite(cf)||cf<0)cf=0;
    if(r.max!=null&&r.max!==""&&cf>Number(r.max))cf=Number(r.max);
    return cf;
  }
  const stored=answers[r.name+"#count"];
  if(stored!=null)return Math.max(0,Math.floor(Number(stored))||0);
  return Number(r.min)||0;
}
function flatRosterFields(r){const out=[];function go(a){(a||[]).forEach(c=>{c.kind==="field"?out.push(c):c.components&&go(c.components);});}go(r.components);return out;}
function rowSummary(r,i){
  const fields=(r.rowDisplay&&r.rowDisplay.length)?r.rowDisplay:flatRosterFields(r).slice(0,2).map(c=>c.name);
  return fields.map(fn=>{const v=answers[`${r.name}#${i}#${fn}`];return(v==null||v==="")?null:String(v);}).filter(Boolean).join(" · ");
}
function hasRowData(r,i){return flatRosterFields(r).some(c=>{const v=answers[`${r.name}#${i}#${c.name}`];return v!=null&&v!==""&&!(Array.isArray(v)&&!v.length);});}
function addRowLabel(r){return r.rowTitle?`+ Tambah ${esc(txt(r.rowTitle))}`:"+ Tambah baris";}
// Interpolasi nilai field lain dalam baris roster ke teks label/hint/itemLabel.
// Mendukung dua sintaks: {{nama}} dan ${nama} (dipakai campur di berbagai tempat).
const INTERP_RE=/\{\{\s*([^}]+?)\s*\}\}|\$\{\s*([^}]+?)\s*\}/g;
function rowInterp(text,rp){if(!text||!rp)return text;return text.replace(INTERP_RE,(_,a,b)=>{const v=answers[rp+(a||b).trim()];return v!=null?String(v):"";});}
function rowLabel(r,i){
  if(r.itemLabel){const rp=`${r.name}#${i}#`;return esc(txt(r.itemLabel).replace(/\{\{\s*index\s*\}\}|\$\{\s*index\s*\}/g,String(i+1)).replace(INTERP_RE,(_,a,b)=>{const v=answers[rp+(a||b).trim()];return v!=null?String(v):"";}));}
  return r.rowTitle?`${esc(txt(r.rowTitle))} #${i+1}`:`Baris #${i+1}`;
}
function rosterHtml(r){
  const count=rosterCount(r),manual=!r.countFrom,rn=esc(r.name);
  const title=esc(txt(r.title)||r.name);
  if(r.rosterType==="separate"){
    let h=`<div class="pv-roster" id="pvroster_${rn}"><div class="pv-rh">${title}<span class="pv-tag">subhalaman</span></div>`;
    if(r.countFrom&&count<=0)h+=`<div class="pv-rowempty">Isi dulu kolom "${esc(r.countFrom)}" untuk menentukan jumlah baris.</div>`;
    else if(count<=0)h+=`<div class="pv-rowempty">Belum ada baris.</div>`;
    else{h+=`<div class="pv-rowlist">`;for(let i=0;i<count;i++){const sum=rowSummary(r,i),filled=hasRowData(r,i);h+=`<div class="pv-rowitem"><div class="pv-rowinfo"><b>${rowLabel(r,i)}</b><span>${sum?esc(sum):"<i>belum diisi</i>"}</span></div>${manual?`<button class="pv-rowdel" data-delrow="${rn}" data-i="${i}">hapus</button>`:""}<button class="pv-rowopen" data-openrow="${rn}" data-i="${i}">${filled?"Edit":"Isi"} →</button></div>`;}h+=`</div>`;}
    if(manual)h+=`<button class="pv-add" data-addrow="${rn}">${addRowLabel(r)}</button>`;
    return h+`</div>`;
  }
  let h=`<div class="pv-roster" id="pvroster_${rn}"><div class="pv-rh">${title}</div>`;
  if(r.countFrom&&count<=0)h+=`<div class="pv-rowempty">Isi dulu kolom "${esc(r.countFrom)}" untuk menentukan jumlah baris.</div>`;
  for(let i=0;i<count;i++){const rowSkip=computeRosterRowSkipState(r,i);ROW_SKIP_HIDDEN.set(`${r.name}#${i}`,rowSkip);rowSkip.forEach(n=>{delete answers[`${r.name}#${i}#${n}`];});const rp=`${r.name}#${i}#`;h+=`<div class="pv-row"><div class="pv-rownum"><span>${rowLabel(r,i)}</span>${manual?`<button class="pv-del" data-delrow="${rn}" data-i="${i}">hapus</button>`:""}</div>`;(r.components||[]).forEach(f=>h+=nodeHtml(f,rp));h+=`</div>`;}
  if(manual)h+=`<button class="pv-add" data-addrow="${rn}">${addRowLabel(r)}</button>`;
  return h+`</div>`;
}
function primaryRowField(r){if(r.rowDisplay&&r.rowDisplay.length)return r.rowDisplay[0];const f=flatRosterFields(r)[0];return f?f.name:null;}
function openAddRowModal(roster){

    :`<input type="text" id="addRowInput" placeholder="${esc(title)}…">`;

function findRoster(rname){function search(comps){for(const c of comps){if(c.kind==="roster"&&c.name===rname)return c;if(c.components){const f=search(c.components);if(f)return f;}}return null;}for(const p of PAGES){const f=search(p.components||[]);if(f)return f;}return null;}
function deleteRow(rname,idx){
  const roster=findRoster(rname),count=rosterCount(roster),prefix=rname+"#",nv={};
  Object.keys(answers).forEach(k=>{
    if(k===rname+"#count")return;
    if(k.startsWith(prefix)){const m=k.slice(prefix.length).match(/^(\d+)#(.*)$/);if(m){let ri=+m[1];const fn=m[2];if(ri===idx)return;if(ri>idx)ri--;nv[`${prefix}${ri}#${fn}`]=answers[k];return;}}
    nv[k]=answers[k];
  });
  nv[rname+"#count"]=Math.max(0,count-1);answers=nv;
}

/* ---- visibilitas & navigasi halaman ---- */
function isPageVisible(i){return i>=0&&i<PAGES.length&&evalVisible(PAGES[i].visibleWhen,"");}
function visiblePageIdx(){return PAGES.map((_,i)=>i).filter(isPageVisible);}
function nextVisibleIndex(from){for(let i=from+1;i<PAGES.length;i++)if(isPageVisible(i))return i;return -1;}
function prevVisibleIndex(from){for(let i=from-1;i>=0;i--)if(isPageVisible(i))return i;return -1;}
function nearestVisibleIndex(idx){if(isPageVisible(idx))return idx;const f=nextVisibleIndex(idx-1);if(f!==-1)return f;const b=prevVisibleIndex(idx+1);return b!==-1?b:idx;}

/* ---- skip-to ---- */
function nodeContainsName(node,target){if(node.name===target)return true;return (node.components||[]).some(c=>nodeContainsName(c,target));}
function pageIndexOfTarget(target){
  if(!target)return null;
  if(target==="__next")return null;
  if(target==="__prev"){const p=prevVisibleIndex(curPage);return p!==-1?p:null;}
  if(target==="__end"){const vis=visiblePageIdx();return vis.length?vis[vis.length-1]:PAGES.length-1;}
  for(let i=0;i<PAGES.length;i++){if(nodeContainsName(PAGES[i],target))return nearestVisibleIndex(i);}
  return null;
}
function fieldSkipTarget(f){
  for(const s of (f.skips||[])){
    if(!s.when||!s.to)continue;
    const r=evalExprSrc(s.when,"");
    if(r===undefined)continue;
    if(r)return s.to;
  }
  if(CHOICE.has(f.type)&&Array.isArray(f.options)){
    const v=answers[f.name];
    const sel=Array.isArray(v)?v.map(String):[String(v)];
    for(const o of f.options){if(o.skipTo&&sel.includes(String(o.value)))return o.skipTo;}
  }
  return null;
}
// Target skip pertama yang terdaftar pada field ini (dipakai sebagai default
// ketika field belum dijawab sama sekali — lihat fieldEffectiveSkipTarget).
function fieldPendingTarget(f){
  const s=(f.skips||[]).find(x=>x.when&&x.to);
  if(s)return s.to;
  if(CHOICE.has(f.type)&&Array.isArray(f.options)){
    const o=f.options.find(o=>o.skipTo);
    if(o)return o.skipTo;
  }
  return null;
}
// Field yang punya kemampuan skip tapi BELUM dijawab dianggap "pending":
// secara default field di antara dia dan target tetap disembunyikan sampai
// dijawab dengan opsi yang TIDAK memicu skip (baru jalur normal terbuka).
function fieldEffectiveSkipTarget(f){
  const t=fieldSkipTarget(f);
  if(t)return t;
  if(pvEmpty(answers[f.name]))return fieldPendingTarget(f);
  return null;
}
// Varian roster: evaluasi skip dengan jawaban dari baris tertentu (rp = "roster#idx#").
function fieldSkipTargetRp(f,rp){
  for(const s of (f.skips||[])){
    if(!s.when||!s.to)continue;
    const r=evalExprSrc(s.when,rp);
    if(r===undefined)continue;
    if(r)return s.to;
  }
  if(CHOICE.has(f.type)&&Array.isArray(f.options)){
    const v=answers[rp+f.name];
    const sel=Array.isArray(v)?v.map(String):[String(v)];
    for(const o of f.options){if(o.skipTo&&sel.includes(String(o.value)))return o.skipTo;}
  }
  return null;
}
function fieldEffectiveSkipTargetRp(f,rp){
  const t=fieldSkipTargetRp(f,rp);
  if(t)return t;
  if(pvEmpty(answers[rp+f.name]))return fieldPendingTarget(f);
  return null;
}
// Hitung field dalam satu baris roster yang harus disembunyikan karena skip-to.
// Target "__end" berarti akhiri sisa baris ini (field setelahnya di baris yang
// sama disembunyikan; baris roster lain tidak terpengaruh).
function computeRosterRowSkipState(roster,rowIdx){
  const rp=`${roster.name}#${rowIdx}#`;
  const allRowFields=flatRosterFields(roster);
  const allNames=new Set(allRowFields.map(f=>f.name));
  const hidden=new Set();
  let skipActive=false,skipTarget=null;
  for(const f of allRowFields){
    if(skipActive){
      if(skipTarget&&f.name===skipTarget){skipActive=false;skipTarget=null;}
      else{hidden.add(f.name);continue;}
    }
    const t=fieldEffectiveSkipTargetRp(f,rp);
    if(t==="__end"){skipActive=true;skipTarget=null;}
    else if(t&&allNames.has(t)&&t!==f.name){skipActive=true;skipTarget=t;}
  }
  return hidden;
}
// Hitung field mana di halaman ini yang harus disembunyikan karena ada skip
// yang sedang aktif (target ada di halaman yang sama), dan target halaman
// lain bila skip yang aktif belum "selesai" sampai akhir halaman ini.
function computePageSkipState(page){
  const hidden=new Set();
  const fields=[];
  (function walk(n,prefix){(n.components||[]).forEach(c=>{if(c.kind==="field")fields.push(c);else if(c.kind!=="roster")walk(c,prefix);});})(page,"");
  let skipActive=false,skipTarget=null,crossPageTarget=null;
  for(const f of fields){
    if(skipActive){
      if(f.name===skipTarget){skipActive=false;skipTarget=null;}
      else{hidden.add(f.name);continue;}
    }
    const t=fieldEffectiveSkipTarget(f);
    if(t&&t!=="__next"){
      if(nodeContainsName(page,t)&&t!==f.name){skipActive=true;skipTarget=t;}
      else{skipActive=true;skipTarget=null;crossPageTarget=t;}
    }
  }
  return{hidden,crossPageTarget:skipActive?crossPageTarget:null};
}
let SKIP_HIDDEN=new Set();
let ROW_SKIP_HIDDEN=new Map();
function clearPageAnswers(pageIdx){
  const page=PAGES[pageIdx];if(!page)return;
  (function walk(n,prefix){(n.components||[]).forEach(c=>{
    if(c.kind==="field"){delete answers[prefix+c.name];}
    else if(c.kind==="roster"){
      const cnt=Math.max(rosterCount(c),Number(answers[`${c.name}#count`])||0);
      for(let i=0;i<cnt;i++){(c.components||[]).forEach(f=>{delete answers[`${c.name}#${i}#${f.name}`];});}
      delete answers[`${c.name}#count`];
    }else{walk(c,prefix);}
  });})(page,"");
}
function clearSkippedAnswers(fromIdx,toIdx){if(toIdx<=fromIdx+1)return;for(let i=fromIdx+1;i<toIdx;i++)clearPageAnswers(i);}

/* ---- validasi sebelum lanjut/kirim ---- */
function pageValidationTargets(page){
  const out=[];
  (function walk(n,prefix){(n.components||[]).forEach(c=>{
    if(!evalVisible(c.visibleWhen,prefix))return;
    if(c.kind==="field"){if(!SKIP_HIDDEN.has(c.name))out.push({c,rp:prefix});}
    else if(c.kind==="roster"){
      if(c.rosterType==="inline"){
        const cnt=rosterCount(c);
        for(let i=0;i<cnt;i++){const rp2=`${c.name}#${i}#`;(c.components||[]).forEach(f=>{if(evalVisible(f.visibleWhen,rp2))out.push({c:f,rp:rp2});});}
      }
    }else{walk(c,prefix);}
  });})(page,"");
  return out;
}
function validateCurrentPage(){
  saveAnswers();
  const targets=pageValidationTargets(PAGES[curPage]);
  for(const {c,rp} of targets){
    if(c.type==="note"||c.type==="markdown"||c.type==="hidden"||(c.type==="calculated"&&!c.autofill))continue;
    if(!evalVisible(c.enableWhen,rp))continue;
    const key=rp+c.name,val=answers[key];
    const isRequired=!!c.required||!!(c.requiredWhen&&evalVisible(c.requiredWhen,rp));
    if(isRequired&&pvEmpty(val))return{ok:false,key};
    if(!pvEmpty(val)){
      for(const v of (c.validations||[])){
        if(!v.test||v.severity==="warning")continue;
        const r=evalExprSrc(v.test,rp);
        if(r===undefined)continue;
        if(!r)return{ok:false,key};
      }
    }
  }
  return{ok:true,key:null};
}
function focusField(key){
  const el=document.querySelector(`[data-fieldkey="${CSS.escape(key)}"]`);
  if(!el)return;
  el.classList.add("pv-field-err");
  el.scrollIntoView({behavior:"smooth",block:"center"});
  setTimeout(()=>el.classList.remove("pv-field-err"),2500);
}

/* ---- kumpulkan semua error di seluruh halaman ---- */
function collectAllErrors(){
  saveAnswers();
  const errors=[];
  for(let pi=0;pi<PAGES.length;pi++){
    const page=PAGES[pi];
    if(!evalVisible(page.visibleWhen,""))continue;
    const saved=SKIP_HIDDEN;
    SKIP_HIDDEN=computePageSkipState(page).hidden;
    const targets=pageValidationTargets(page);
    SKIP_HIDDEN=saved;
    for(const {c,rp} of targets){
      if(c.type==="note"||c.type==="markdown"||c.type==="hidden"||(c.type==="calculated"&&!c.autofill))continue;
      if(!evalVisible(c.enableWhen,rp))continue;
      const key=rp+c.name,val=answers[key];
      const isRequired=!!c.required||!!(c.requiredWhen&&evalVisible(c.requiredWhen,rp));
      if(isRequired&&pvEmpty(val)){errors.push({pageIdx:pi,key,label:txt(c.label)||c.name,rp,msg:""});continue;}
      if(!pvEmpty(val)){
        for(const v of (c.validations||[])){
          if(!v.test||v.severity==="warning")continue;
          const r=evalExprSrc(v.test,rp);
          if(r===undefined)continue;
          if(!r){errors.push({pageIdx:pi,key,label:txt(c.label)||c.name,rp,msg:txt(v.message)||""});break;}
        }
      }
    }
  }
  return errors;
}

/* ---- navigasi ---- */
function saveAnswers(){

  document.querySelectorAll("[data-kr]:checked").forEach(el=>{answers[el.dataset.kr]=el.value;});

  cbKeys.forEach(key=>{answers[key]=[...document.querySelectorAll(`[data-kc="${CSS.escape(key)}"]:checked`)].map(el=>el.value);});

function setupSidebarToggle(side){
  const tog=document.getElementById("pvSideTog");
  const bd=document.getElementById("pvSideBd");
  if(!tog||!side)return;
  const mobile=()=>window.innerWidth<=700;
  tog.addEventListener("click",()=>{
    if(mobile()){const open=side.classList.toggle("open");if(bd)bd.classList.toggle("show",open);}
    else{side.classList.toggle("collapsed");}
  });
  if(bd)bd.addEventListener("click",()=>{side.classList.remove("open");bd.classList.remove("show");});
}
function goToPage(idx){
  saveAnswers();rosterView=null;
  idx=Math.max(0,Math.min(idx,PAGES.length-1));
  curPage=nearestVisibleIndex(idx);
  renderSidebar();renderCurrentPage();
  const pvBody=document.getElementById("pvBody");if(pvBody)pvBody.scrollTop=0;
}
function separateRostersInPage(p){
  const out=[];
  (function go(comps){(comps||[]).forEach(c=>{
    if(c.kind==="roster"&&c.rosterType==="separate")out.push(c);
    if(c.components)go(c.components);
  });})(p.components||[]);
  return out;
}
/* Pertahankan posisi elemen yang baru dijawab di viewport meski konten berubah */
function snapScroll(fkey,top0){
  if(!fkey||top0==null)return;

  const nf=pvBody.querySelector(`.pv-field[data-fieldkey="${CSS.escape(fkey)}"]`);

}
function renderSidebar(){
  const side=document.getElementById("pvSide");if(!side)return;

    });

function renderCurrentPage(){
  // Catatan: TIDAK reset scroll di sini — fungsi ini juga dipanggil untuk
  // live update (mis. coretan tanda tangan, ambil lokasi) yang seharusnya
  // tidak melompat balik ke atas halaman. Reset scroll hanya di goToPage().
  const pvBody=document.getElementById("pvBody");
  if(!pvBody||!PAGES.length)return;

  const p=PAGES[curPage],isLast=nextVisibleIndex(curPage)===-1;
  const vis=visiblePageIdx(),posInVis=vis.indexOf(curPage)+1,totalVis=vis.length;
  SKIP_HIDDEN=computePageSkipState(p).hidden;
  SKIP_HIDDEN.forEach(name=>{delete answers[name];});
  ROW_SKIP_HIDDEN=new Map();
  pending=[];
  const userBar=document.getElementById("pvUserBar")?.outerHTML||"";
  let html=`${userBar}<div class="pv-page"><h2 class="pv-h2">${esc(txt(p.title)||p.name||`Halaman ${curPage+1}`)}</h2>`;

  if(isLast)html+=`<div class="msg" id="msg"></div>`;
  if(isLast&&!ALLOW)html+=`<div class="view-hint">Tautan ini hanya untuk melihat kuesioner — tidak menerima jawaban.</div>`;
  const isEdit=!!EXISTING_RESPONSE;
  const prevBtn=prevVisibleIndex(curPage)!==-1?`<button class="btn" id="pvPrev">← Sebelumnya</button>`:`<span></span>`;
  const saveDraftBtn=ALLOW?`<button class="pv-savedraft" id="pvSaveDraft">Simpan Draf</button>`:"";
  const nextBtn=isLast
    ?(ALLOW?`<button class="btn primary" id="pvSubmit">${isEdit?"Perbarui Jawaban":"Kirim Jawaban"}</button>`:`<span></span>`)
    :`<button class="btn primary" id="pvNext">Lanjut →</button>`;
  html+=`<div class="foot">eForm · BPS Provinsi Kalimantan Timur</div>`;
  pvBody.innerHTML=html;
  const navArea=document.getElementById("pvNavArea");
  if(navArea){
    const pct=totalVis>1?Math.round((posInVis/totalVis)*100):100;
    navArea.innerHTML=`<div class="pv-nav-err" id="pvNavErr"></div><div class="pv-nav">${prevBtn}<div class="pv-prog-wrap"><div class="pv-progbar-track"><div class="pv-progbar" style="width:${pct}%"></div></div><span class="pv-prog">Halaman ${posInVis} / ${totalVis}</span></div><div style="display:flex;gap:8px;align-items:center">${saveDraftBtn}${nextBtn}</div></div>`;

/* ---- restore & bind ---- */
function restoreAnswers(){
  document.querySelectorAll("[data-k]").forEach(el=>{const v=answers[el.dataset.k];if(v!=null)el.value=v;});
  document.querySelectorAll("[data-kr]").forEach(el=>{el.checked=(String(answers[el.dataset.kr])===el.value);});
}
function bindPageEvents(){
  document.getElementById("pvPrev")?.addEventListener("click",()=>{const p=prevVisibleIndex(curPage);if(p!==-1)goToPage(p);});
  document.getElementById("pvNext")?.addEventListener("click",()=>{
    const gate=validateCurrentPage();
    if(!gate.ok){
      const err=document.getElementById("pvNavErr");if(err)err.textContent="Lengkapi pertanyaan wajib / perbaiki isian yang tidak valid sebelum melanjutkan.";
      focusField(gate.key);
      return;
    }
    const target=computePageSkipState(PAGES[curPage]).crossPageTarget;
    const skipIdx=target?pageIndexOfTarget(target):null;
    if(skipIdx!=null){clearSkippedAnswers(curPage,skipIdx);goToPage(skipIdx);return;}
    const nxt=nextVisibleIndex(curPage);
    if(nxt!==-1)goToPage(nxt);
  });
  document.getElementById("pvSubmit")?.addEventListener("click",()=>{
    const errors=collectAllErrors();
    if(errors.length>0){showErrorSummary(errors);return;}
    submit();
  });
  document.getElementById("pvSaveDraft")?.addEventListener("click",()=>saveDraftToServer());
  document.querySelectorAll("[data-addrow]").forEach(btn=>btn.addEventListener("click",()=>{
    const rname=btn.dataset.addrow,roster=findRoster(rname);if(!roster)return;
    openAddRowModal(roster);
  }));
  document.querySelectorAll("[data-delrow]").forEach(btn=>btn.addEventListener("click",()=>{
    saveAnswers();deleteRow(btn.dataset.delrow,+btn.dataset.i);renderCurrentPage();
  }));
  document.querySelectorAll("[data-openrow]").forEach(btn=>btn.addEventListener("click",()=>{
    openRosterRow(btn.dataset.openrow,+btn.dataset.i);
  }));
  const cfFields=new Set();
  (PAGES[curPage]?.components||[]).forEach(function walk(c){if(c.kind==="roster"&&c.countFrom)cfFields.add(c.countFrom);(c.components||[]).forEach(walk);});
  // Re-render hidup saat field berubah. Setelah render, kembalikan fokus ke elemen
  // yang aktif sebelumnya agar navigasi tab tidak terputus.
  const rerenderPage=(e)=>{
    const src=e?.target;
    const fk=src?.dataset?.k;
    const fkr=src?.dataset?.kr;
    const field=src?.closest(".pv-field");
    const fkey=field?.dataset?.fieldkey;
    const top0=fkey?field.getBoundingClientRect().top:null;
    saveAnswers();renderCurrentPage();
    (fk?document.querySelector(`[data-k="${CSS.escape(fk)}"]`):fkr?document.querySelector(`[data-kr="${CSS.escape(fkr)}"]`):null)?.focus();
    snapScroll(fkey,top0);
  };
  document.querySelectorAll("[data-k]").forEach(el=>el.addEventListener("change",rerenderPage));
  document.querySelectorAll("[data-kr]").forEach(el=>el.addEventListener("change",rerenderPage));
  wireFieldWidgets();
}

/* ---- widget field khusus: tanda tangan, lokasi, pindai barcode ---- */
function wireFieldWidgets(){
  document.querySelectorAll(".pv-sigpad").forEach(canvas=>wireSignaturePad(canvas));
  document.querySelectorAll(".pv-geobtn").forEach(btn=>wireGeoButton(btn));
  document.querySelectorAll(".pv-scanbtn").forEach(btn=>wireScanButton(btn));

function wireSignaturePad(canvas){
  if(canvas._wired)return;canvas._wired=true;
  const hidden=canvas.previousElementSibling; // <input type="hidden" data-k="...">
  if(!hidden)return;
  const ctx=canvas.getContext("2d");
  ctx.lineWidth=2.2;ctx.lineCap="round";ctx.lineJoin="round";ctx.strokeStyle="#13171e";
  if(hidden.value)loadSignatureImage(canvas,hidden.value);
  let drawing=false,last=null;
  const pos=e=>{const r=canvas.getBoundingClientRect();return {x:(e.clientX-r.left)*(canvas.width/r.width),y:(e.clientY-r.top)*(canvas.height/r.height)};};
  const start=e=>{if(canvas.dataset.disabled==="1")return;e.preventDefault();drawing=true;last=pos(e);};
  const move=e=>{if(!drawing)return;e.preventDefault();const p=pos(e);ctx.beginPath();ctx.moveTo(last.x,last.y);ctx.lineTo(p.x,p.y);ctx.stroke();last=p;};
  const end=()=>{
    if(!drawing)return;drawing=false;
    hidden.value=canvas.toDataURL("image/png");
    hidden.dispatchEvent(new Event("change",{bubbles:true}));
  };
  canvas.addEventListener("pointerdown",start);
  canvas.addEventListener("pointermove",move);
  canvas.addEventListener("pointerup",end);
  canvas.addEventListener("pointercancel",end);
  canvas.addEventListener("pointerleave",end);
  const clearBtn=canvas.parentElement.querySelector(".pv-sigclear");
  clearBtn?.addEventListener("click",()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);
    hidden.value="";
    hidden.dispatchEvent(new Event("change",{bubbles:true}));
  });
}
function loadSignatureImage(canvas,dataUrl){
  const ctx=canvas.getContext("2d");
  const img=new Image();
  img.onload=()=>{ctx.clearRect(0,0,canvas.width,canvas.height);ctx.drawImage(img,0,0,canvas.width,canvas.height);};
  img.src=dataUrl;
}

function wireGeoButton(btn){
  if(btn._wired)return;btn._wired=true;
  btn.addEventListener("click",()=>{
    const wrap=btn.closest(".pv-field");
    const msg=wrap?.querySelector(".pv-geomsg");
    const input=btn.previousElementSibling;
    if(msg){msg.textContent="";msg.classList.remove("error");}
    if(!navigator.geolocation){if(msg){msg.textContent="Geolocation tidak didukung browser ini.";msg.classList.add("error");}return;}
    const orig=btn.textContent;btn.disabled=true;btn.textContent="Mencari…";
    navigator.geolocation.getCurrentPosition(
      pos=>{
        btn.disabled=false;btn.textContent=orig;
        input.value=`${pos.coords.latitude.toFixed(6)}, ${pos.coords.longitude.toFixed(6)}`;
        input.dispatchEvent(new Event("change",{bubbles:true}));
      },
      err=>{
        btn.disabled=false;btn.textContent=orig;
        if(msg){msg.textContent=err.code===1?"Izin lokasi ditolak.":"Gagal mengambil lokasi: "+err.message;msg.classList.add("error");}
      },
      {enableHighAccuracy:true,timeout:15000}
    );
  });
}

function wireScanButton(btn){
  if(btn._wired)return;btn._wired=true;
  if(!("BarcodeDetector" in window)){btn.disabled=true;btn.title="Pemindaian otomatis tidak didukung browser ini — isi manual.";return;}
  btn.addEventListener("click",()=>openBarcodeScanner(btn.previousElementSibling));
}
async function openBarcodeScanner(input){
  const bg=document.createElement("div");bg.className="pv-modal-bg";
  bg.innerHTML=`<div class="pv-modal pv-scanmodal">
    <h3>Pindai Barcode</h3>
    <p class="pv-modal-sub">Arahkan kamera ke barcode/QR.</p>
    <video id="scanVideo" autoplay playsinline muted></video>
    <div class="pv-modal-actions"><button class="btn ghost" id="scanCancel">Batal</button></div>
  </div>`;
  document.body.appendChild(bg);
  const video=bg.querySelector("#scanVideo"),sub=bg.querySelector(".pv-modal-sub");
  let stream=null,stopped=false;
  const close=()=>{stopped=true;if(stream)stream.getTracks().forEach(t=>t.stop());bg.remove();};
  bg.querySelector("#scanCancel").addEventListener("click",close);
  bg.addEventListener("click",e=>{if(e.target===bg)close();});
  try{
    stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
    video.srcObject=stream;
    const detector=new BarcodeDetector();
    const loop=async()=>{
      if(stopped)return;
      try{
        const codes=await detector.detect(video);
        if(codes.length){
          input.value=codes[0].rawValue;
          input.dispatchEvent(new Event("change",{bubbles:true}));
          close();
          return;
        }
      }catch(_){}
      requestAnimationFrame(loop);
    };
    requestAnimationFrame(loop);
  }catch(e){
    if(sub)sub.textContent="Tidak bisa mengakses kamera: "+e.message;
  }
}

/* ---- foto / file upload ---- */
function wirePhotoField(wrap){
  if(wrap._wired)return;wrap._wired=true;
  const hidden=wrap.querySelector("input[type=hidden]");
  const fileInput=wrap.querySelector(".pv-photofile");
  const preview=wrap.querySelector(".pv-photopreview");
  if(!hidden||!fileInput||!preview)return;
  if(hidden.value)showPhotoPreview(preview,hidden.value,fileInput.disabled);
  fileInput.addEventListener("change",()=>{
    const f=fileInput.files[0];if(!f)return;
    const reader=new FileReader();
    reader.onload=e=>{
      hidden.value=e.target.result;
      hidden.dispatchEvent(new Event("change",{bubbles:true}));
      showPhotoPreview(preview,e.target.result,false);
    };
    reader.readAsDataURL(f);
  });
  preview.addEventListener("click",e=>{
    if(!e.target.classList.contains("pv-photoclear"))return;
    hidden.value="";fileInput.value="";
    preview.hidden=true;preview.innerHTML="";
    hidden.dispatchEvent(new Event("change",{bubbles:true}));
  });
}
function showPhotoPreview(preview,dataUrl,disabled){
  const isImage=dataUrl.startsWith("data:image");
  const dis=disabled?" disabled":"";
  if(isImage)
    preview.innerHTML=`<img class="pv-photoimg" src="${dataUrl}"><button type="button" class="pv-smbtn pv-photoclear"${dis}>Hapus foto</button>`;
  else
    preview.innerHTML=`<span style="font-size:12.5px;color:var(--ink-soft)">File dipilih</span><button type="button" class="pv-smbtn pv-photoclear"${dis}>Hapus</button>`;
  preview.hidden=false;
}

/* ---- async options ---- */
function resolveOptions(){
  const snap=pending.splice(0);
  snap.forEach(async({c,rp,enabled})=>{
    rp=rp||"";const key=rp+c.name,ke=esc(key);
    const box=document.getElementById("opt-"+ke);if(!box)return;
    const dis=enabled===false?" disabled":"";

    // Dependency: placeholder {dep} di URL optionsApi + dataKey trigger eksplisit (depKeys)
    const urlTpl=(c.optionsApi&&c.optionsApi.url)||"";
    const urlDeps=[...urlTpl.matchAll(/\{([^}]+)\}/g)].map(m=>m[1]);
    const explicitDeps=((c.optionsApi&&c.optionsApi.depKeys)||"").split(",").map(s=>s.trim()).filter(Boolean);
    const deps=[...new Set([...urlDeps,...explicitDeps])];

    // Re-render yang tepat: baris roster atau halaman biasa
    const rerender=()=>{saveAnswers();rosterView?renderRosterRow():renderCurrentPage();};

    // Pasang listener pada field dependency: cari elemen dengan prefix roster dahulu,
    // fallback ke field halaman. Ketika berubah, hapus jawaban ini lalu re-render.
    function wireDeps(){
      deps.forEach(dep=>{
        const el=document.querySelector(`[data-k="${CSS.escape(rp+dep)}"]`)
               ||document.querySelector(`[data-k="${CSS.escape(dep)}"]`);
        if(el&&!el._depWired){
          el._depWired=true;
          el.addEventListener("change",()=>{saveAnswers();answers[key]="";rerender();});
        }
      });
    }

    // Nilai dep: cari roster-prefixed dahulu, fallback ke field halaman
    const depVal=dep=>(rp?(answers[rp+dep]??answers[dep]):answers[dep]);
    const missing=deps.find(dep=>{const v=depVal(dep);return v==null||v==="";});
    if(missing){
      answers[key]="";
      box.innerHTML=`<select class="pv-in" disabled><option value="">— isi kolom sebelumnya dahulu —</option></select>`;
      wireDeps();
      return;
    }

    wireDeps();
    const opts=await optionsFor(c,rp);
    const multi=(c.type==="checkbox"||c.type==="multiselect");
    const saved=answers[key];
    if(c.type==="select"){
      const cur=saved!=null?String(saved):"";
      box.innerHTML=`<select data-k="${ke}" class="pv-in"${dis}><option value="">— pilih —</option>${opts.map(o=>`<option value="${esc(o.value)}"${cur===String(o.value)?" selected":""}>${esc(o.label)}</option>`).join("")}</select>`;
      if(enabled!==false)box.querySelector("select")?.addEventListener("change",()=>{saveAnswers();rerender();});
    }else{
      const savedArr=Array.isArray(saved)?saved.map(String):(saved!=null?[String(saved)]:[]);
      box.innerHTML=opts.map(o=>{const chk=multi?savedArr.includes(String(o.value)):String(saved)===String(o.value);const attr=multi?`data-kc="${ke}"`:`name="r_${ke}" data-kr="${ke}"`;return`<label class="pv-opt"><input type="${multi?"checkbox":"radio"}" ${attr} value="${esc(o.value)}"${chk?" checked":""}${dis}> ${esc(o.label)}</label>`;}).join("")||`<span class="pv-loading">tidak ada pilihan</span>`;
      if(enabled!==false)box.querySelectorAll("[data-kr],[data-kc]").forEach(el=>el.addEventListener("change",()=>{saveAnswers();rerender();}));
    }
  });
}

/* ---- submit ---- */
function collectAll(){
  saveAnswers();
  const ans={};
  Object.entries(answers).forEach(([k,v])=>{if(Array.isArray(v)?v.length>0:(v!==""&&v!=null))ans[k]=v;});
  return ans;
}
async function submit(){
  const btn=document.getElementById("pvSubmit"),msg=document.getElementById("msg");
  if(!btn||!msg)return;
  msg.className="msg";
  const ans=collectAll();
  if(!Object.keys(ans).length){msg.className="msg err";msg.textContent="Belum ada jawaban yang diisi.";return;}
  btn.disabled=true;btn.textContent="Mengirim…";
  try{
    const headers=pubHeaders({"Content-Type":"application/json"});
    const r=await fetch("/api/public/forms/"+encodeURIComponent(SHARE_TOKEN)+"/responses",
      {method:"POST",headers,body:JSON.stringify({answers:ans})});
    const d=await r.json();
    if(r.status===401){msg.className="msg err";msg.textContent="Sesi habis. Silakan login ulang.";btn.disabled=false;btn.textContent=EXISTING_RESPONSE?"Perbarui Jawaban":"Kirim Jawaban";return;}
    if(!r.ok)throw new Error(d.error||"Gagal mengirim");
    EXISTING_RESPONSE=d; // update state agar tombol berganti jadi "Perbarui"
    clearDraft(); // sudah aman tersimpan di server, draf lokal tidak diperlukan lagi
    document.getElementById("draftNote")?.remove();
    msg.className="msg ok";
    msg.textContent=EXISTING_RESPONSE?"Jawaban berhasil diperbarui.":"Terima kasih! Jawaban Anda sudah terkirim.";
    btn.textContent="Perbarui Jawaban";btn.disabled=false;
    document.getElementById("pvBody")?.scrollTo({top:0,behavior:"smooth"});
  }catch(e){msg.className="msg err";msg.textContent=e.message;btn.disabled=false;btn.textContent=EXISTING_RESPONSE?"Perbarui Jawaban":"Kirim Jawaban";}
}

fetchForm().catch(e=>showErr(e.message));
</script>
