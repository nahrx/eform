<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Jawaban · eForm</title>
<style>
:root{
  --ink:#13171e;--ink-soft:#4a525e;--muted:#79828f;
  --surface:#eef1f5;--panel:#fff;--panel-2:#f7f9fb;
  --line:#dfe4ea;--line-2:#eef1f5;
  --accent:#0e7490;--accent-ink:#0b5563;--accent-soft:#d6edf1;
  --roster:#047857;
  --ok:#15803d;--ok-soft:#dcfce7;
  --radius:10px;--radius-s:7px;
  --shadow:0 1px 2px rgba(19,23,30,.06),0 8px 24px -16px rgba(19,23,30,.25);
  --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Inter,sans-serif;
  --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
html,body{height:100%;margin:0}
body{font-family:var(--sans);color:var(--ink);background:var(--surface);font-size:14px;line-height:1.45;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}

/* shell */
.shell{display:flex;flex-direction:column;height:100vh}

/* topbar */
.topbar{display:flex;align-items:center;gap:10px;padding:10px 16px;background:var(--panel);border-bottom:1px solid var(--line);flex:none;min-height:50px}
.form-title{font-weight:600;font-size:15px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;min-width:0}
.count-badge{font-family:var(--mono);font-size:11px;color:var(--accent);background:var(--accent-soft);padding:3px 9px;border-radius:999px;white-space:nowrap;flex:none}

/* buttons */
.btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:7px 12px;border-radius:var(--radius-s);font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:.12s}
.btn:hover{border-color:#c6cdd6;background:var(--panel-2)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:var(--accent-ink);border-color:var(--accent-ink)}
.btn-sm{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:4px 9px;border-radius:5px;font-size:12px;cursor:pointer;font-family:inherit}
.btn-sm:hover:not([disabled]){background:var(--panel-2)}
.btn-sm[disabled]{opacity:.4;cursor:default}

/* main split */
.main{flex:1;display:flex;min-height:0}

/* page sidebar (navigasi halaman, mirip tampilan kuesioner) */
.page-side{width:200px;flex:none;background:var(--panel);border-right:1px solid var(--line);overflow:auto;padding:13px 11px}
.page-side-h{font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);margin:0 4px 9px}
.page-item{padding:9px 10px;border-radius:var(--radius-s);cursor:pointer;font-size:12.5px;font-weight:500;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.page-item:hover{background:var(--panel-2)}
.page-item.active{background:var(--accent-soft);color:var(--accent-ink)}

/* list panel */
.list-panel{width:320px;flex:none;background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;min-height:0}
.list-head{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border-bottom:1px solid var(--line);flex:none}
.list-h{font-family:var(--mono);font-size:10.5px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--muted)}
.pager{display:flex;align-items:center;gap:5px}
.pg-info{font-size:11px;color:var(--muted);padding:0 2px}
.list-scroll{flex:1;overflow:auto;padding:8px}

/* response cards */
.resp-card{border:1px solid var(--line);border-radius:var(--radius-s);padding:10px 12px;margin-bottom:6px;cursor:pointer;transition:.1s;background:var(--panel)}
.resp-card:hover{border-color:#c6cdd6;background:var(--panel-2)}
.resp-card.active{border-color:var(--accent);background:var(--accent-soft)}
.rc-top{display:flex;align-items:center;gap:8px;margin-bottom:3px}
.rc-num{font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--accent-ink);background:rgba(14,116,144,.12);padding:2px 7px;border-radius:4px;flex:none}
.resp-card.active .rc-num{background:rgba(255,255,255,.55)}
.rc-time{font-size:11.5px;color:var(--muted)}
.rc-preview{font-size:12px;color:var(--ink-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;padding-left:1px}

/* detail panel */
.detail-panel{flex:1;overflow:auto;padding:22px 26px 60px}
.detail-empty{display:flex;height:100%;align-items:center;justify-content:center;color:var(--muted);font-size:13px;text-align:center}
.detail-empty[hidden]{display:none}
.detail-header{display:flex;align-items:center;gap:12px;margin:0 auto 18px;padding-bottom:14px;border-bottom:1px solid var(--line);max-width:680px}
.dh-num{font-family:var(--mono);font-size:12px;font-weight:700;color:var(--accent-ink);background:var(--accent-soft);padding:4px 10px;border-radius:6px}
.dh-time{font-size:13px;color:var(--muted)}

/* detail schema rendering */
.dr-page{margin:0 auto 22px;max-width:680px}
.dr-page-title{font-size:16px;font-weight:700;margin:0 0 12px;color:var(--ink)}
.dr-block{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:14px 16px;margin-bottom:12px}
.dr-block-title{font-weight:600;font-size:13.5px;margin-bottom:10px;color:var(--ink)}
.dr-section{border:1.5px solid var(--line);border-radius:9px;padding:10px 12px;margin-bottom:10px;background:var(--panel-2)}
.dr-section-title{font-weight:600;font-size:12.5px;color:var(--ink-soft);margin-bottom:8px}
.dr-field{display:flex;gap:12px;padding:6px 0;border-bottom:1px solid var(--line-2);align-items:baseline}
.dr-field:last-child{border-bottom:none}
.dr-label{font-size:12px;color:var(--muted);width:170px;flex:none;line-height:1.4}
.dr-val{font-size:13px;font-weight:500;color:var(--ink);flex:1;word-break:break-word;line-height:1.4}
.dr-field.dr-empty .dr-val{color:var(--muted);font-weight:400;font-style:italic}
.dr-roster{border:1.5px dashed var(--roster);border-radius:9px;padding:12px;margin-bottom:12px;background:#eefaf3}
.dr-roster-title{font-weight:600;font-size:13px;color:var(--roster);margin-bottom:8px}
.dr-roster-empty{font-size:12px;color:var(--muted)}
.dr-row{border:1px solid var(--line);border-radius:7px;background:var(--panel);padding:10px 12px;margin-bottom:8px}
.dr-row:last-child{margin-bottom:0}
.dr-row-num{font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--muted);margin-bottom:6px}
.dr-flat-key{font-family:var(--mono);font-size:11px}
.detail-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;max-width:680px;margin:18px auto 0;padding-top:14px;border-top:1px solid var(--line)}
.detail-nav .pg-prog{font-size:12px;color:var(--muted)}

/* misc */
.loading,.empty-state{padding:28px;text-align:center;color:var(--muted);font-size:13px}

@media(max-width:720px){
  .main{flex-direction:column}
  .list-panel{width:100%;flex:none;max-height:42vh;border-right:none;border-bottom:1px solid var(--line)}
  .page-side{width:100%;flex:none;max-height:160px;border-right:none;border-bottom:1px solid var(--line)}
  .detail-panel{padding:14px 12px 40px}
  .dr-label{width:120px}
}
</style>
</head>
<body>
<div class="shell">
  <header class="topbar">
    <a class="btn" href="/admin">← Admin</a>
    <span class="form-title" id="formTitle">Memuat…</span>
    <span class="count-badge" id="countBadge" hidden></span>
    <button class="btn primary" id="btnCsv" hidden>↓ CSV</button>
  </header>
  <div class="main">
    <div class="list-panel">
      <div class="list-head">
        <span class="list-h">Daftar Jawaban</span>
        <div class="pager" id="pager"></div>
      </div>
      <div class="list-scroll" id="listScroll">
        <div class="loading">Memuat…</div>
      </div>
    </div>
    <aside class="page-side" id="pageSide" hidden>
      <div class="page-side-h">Daftar Halaman</div>
      <div id="pageList"></div>
    </aside>
    <div class="detail-panel" id="detailPanel">
      <div class="detail-empty" id="detailEmpty">Pilih jawaban di sebelah kiri untuk melihat detail.</div>
      <div id="detailContent" hidden></div>
    </div>
  </div>
</div>
<script>
const TOKEN=localStorage.getItem("eform_token");
if(!TOKEN)location.replace("/login");
const FORM_ID=new URLSearchParams(location.search).get("id");
if(!FORM_ID)location.replace("/admin");

const H={"Authorization":"Bearer "+TOKEN,"Content-Type":"application/json"};
const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const txt=v=>v==null?"":(typeof v==="object"?(v.id||Object.values(v)[0]||""):v);

let SCHEMA=null, RESPONSES=[], TOTAL=0, PAGE=0, SELECTED=null, CUR_PAGE=0;
const PAGE_SIZE=25;

async function api(path,opts){
  opts=opts||{};
  const r=await fetch(path,{...opts,headers:{...H,...(opts.headers||{})}});
  if(r.status===401){localStorage.removeItem("eform_token");location.replace("/login");throw new Error("sesi habis");}
  const ct=r.headers.get("content-type")||"";
  const data=ct.includes("json")?await r.json():null;
  if(!r.ok)throw new Error((data&&data.error)||("HTTP "+r.status));
  return data;
}

async function init(){
  try{
    const form=await api("/api/forms/"+FORM_ID);
    SCHEMA=form.schema;
    const title=form.title||"Kuesioner";
    document.title="Jawaban · "+title;
    document.getElementById("formTitle").textContent=title;
    document.getElementById("btnCsv").hidden=false;
    document.getElementById("btnCsv").addEventListener("click",downloadCsv);
    await loadPage(0);
  }catch(e){
    document.getElementById("formTitle").textContent="Gagal memuat: "+e.message;
  }
}

async function loadPage(page){
  PAGE=page;
  document.getElementById("listScroll").innerHTML='<div class="loading">Memuat…</div>';
  try{
    const data=await api("/api/forms/"+FORM_ID+"/responses?limit="+PAGE_SIZE+"&offset="+(PAGE*PAGE_SIZE));
    RESPONSES=data.responses||[];
    TOTAL=data.total||0;
    const badge=document.getElementById("countBadge");
    badge.textContent=TOTAL+" jawaban";
    badge.hidden=false;
    renderList();
  }catch(e){
    document.getElementById("listScroll").innerHTML=`<div class="empty-state">${esc(e.message)}</div>`;
  }
}

/* ---- list ---- */
function renderList(){
  const totalPages=Math.ceil(TOTAL/PAGE_SIZE)||1;

  // pager
  const pager=document.getElementById("pager");
  if(totalPages>1){
    pager.innerHTML=`<button class="btn-sm" id="pgPrev"${PAGE===0?" disabled":""}>‹</button><span class="pg-info">${PAGE+1}/${totalPages}</span><button class="btn-sm" id="pgNext"${PAGE>=totalPages-1?" disabled":""}>›</button>`;
    document.getElementById("pgPrev")?.addEventListener("click",()=>loadPage(PAGE-1));
    document.getElementById("pgNext")?.addEventListener("click",()=>loadPage(PAGE+1));
  }else{
    pager.innerHTML="";
  }

  const scroll=document.getElementById("listScroll");
  if(!RESPONSES.length){scroll.innerHTML='<div class="empty-state">Belum ada jawaban.</div>';return;}

  scroll.innerHTML=RESPONSES.map((resp,i)=>{
    const num=PAGE*PAGE_SIZE+i+1;
    const answers=parseAnswers(resp.answers);
    const meta=parseAnswers(resp.meta);
    const preview=getPreview(answers);
    const who=meta.name?`${esc(meta.name)} · ${esc(meta.email||"")}`:esc(meta.email||"");
    return`<div class="resp-card${SELECTED===i?" active":""}" data-i="${i}">
      <div class="rc-top"><span class="rc-num">#${num}</span><span class="rc-time">${formatDate(resp.submittedAt)}</span></div>
      ${who?`<div class="rc-preview" style="color:var(--accent-ink)">${who}</div>`:""}
      ${preview?`<div class="rc-preview">${esc(preview)}</div>`:""}
    </div>`;
  }).join("");

  scroll.querySelectorAll(".resp-card").forEach(card=>
    card.addEventListener("click",()=>selectResponse(+card.dataset.i))
  );
}

/* ---- detail ---- */
function selectResponse(idx){
  SELECTED=idx;
  CUR_PAGE=0;
  document.querySelectorAll(".resp-card").forEach((c,i)=>c.classList.toggle("active",i===idx));
  renderDetail();
}

// Tampilan detail jawaban dibuat mirip kuesioner: satu halaman per tampilan,
// dengan sidebar navigasi halaman (lihat #pageSide) + tombol Sebelumnya/Selanjutnya.
function renderDetail(){
  const resp=RESPONSES[SELECTED];
  if(!resp)return;
  const answers=parseAnswers(resp.answers);
  const num=PAGE*PAGE_SIZE+SELECTED+1;
  const meta=parseAnswers(resp.meta);
  const pages=(SCHEMA&&SCHEMA.pages)||[];

  renderPageSide(pages);

  let body;
  if(SCHEMA&&pages.length){
    if(CUR_PAGE>=pages.length)CUR_PAGE=pages.length-1;
    if(CUR_PAGE<0)CUR_PAGE=0;
    const p=pages[CUR_PAGE];
    const title=txt(p.title)||p.name||`Halaman ${CUR_PAGE+1}`;
    body=`<div class="dr-page"><div class="dr-page-title">${esc(title)}</div>${renderNodes(p.components||[],answers,"")}</div>`;
    body+=`<div class="detail-nav">
      <button class="btn" id="dnPrev"${CUR_PAGE===0?" disabled":""}>← Sebelumnya</button>
      <span class="pg-prog">Halaman ${CUR_PAGE+1} / ${pages.length}</span>
      <button class="btn" id="dnNext"${CUR_PAGE>=pages.length-1?" disabled":""}>Selanjutnya →</button>
    </div>`;
  }else{
    body=`<div class="dr-page">${renderFlatDetail(answers)}</div>`;
  }

  document.getElementById("detailEmpty").hidden=true;
  const dc=document.getElementById("detailContent");
  dc.hidden=false;
  dc.innerHTML=`
    <div class="detail-header">
      <span class="dh-num">#${num}</span>
      <span class="dh-time">${formatDate(resp.submittedAt)}</span>
      ${meta.name?`<span style="font-size:12.5px;color:var(--accent-ink);font-weight:500">${esc(meta.name)}</span>`:""}
      ${meta.email?`<span style="font-size:12px;color:var(--muted)">${esc(meta.email)}</span>`:""}
    </div>
    <div id="detailBody">${body}</div>`;

  dc.querySelector("#dnPrev")?.addEventListener("click",()=>{CUR_PAGE--;renderDetail();document.getElementById("detailPanel").scrollTop=0;});
  dc.querySelector("#dnNext")?.addEventListener("click",()=>{CUR_PAGE++;renderDetail();document.getElementById("detailPanel").scrollTop=0;});
}

function renderPageSide(pages){
  const side=document.getElementById("pageSide");
  if(!pages.length){side.hidden=true;return;}
  side.hidden=false;
  const list=document.getElementById("pageList");
  list.innerHTML=pages.map((p,i)=>`<div class="page-item${i===CUR_PAGE?" active":""}" data-pg="${i}">${esc(txt(p.title)||p.name||`Halaman ${i+1}`)}</div>`).join("");
  list.querySelectorAll(".page-item").forEach(el=>el.addEventListener("click",()=>{
    CUR_PAGE=+el.dataset.pg;renderDetail();document.getElementById("detailPanel").scrollTop=0;
  }));
}

function renderNodes(comps,answers,rp){
  return comps.map(c=>renderNode(c,answers,rp)).join("");
}

function renderNode(c,answers,rp){
  if(c.kind==="block"){
    return`<div class="dr-block">${c.title?`<div class="dr-block-title">${esc(txt(c.title))}</div>`:""}${renderNodes(c.components||[],answers,rp)}</div>`;
  }
  if(c.kind==="section"){
    return`<div class="dr-section">${c.title?`<div class="dr-section-title">${esc(txt(c.title))}</div>`:""}${renderNodes(c.components||[],answers,rp)}</div>`;
  }
  if(c.kind==="roster")return renderRosterDetail(c,answers);
  return renderFieldDetail(c,answers,rp);
}

function renderFieldDetail(c,answers,rp){
  if(c.type==="note"||c.type==="markdown"||c.type==="hidden")return"";
  const key=rp+c.name;
  const label=esc(txt(c.label)||c.name);
  const display=formatFieldValue(c,answers[key],answers);
  const empty=display==null||display==="";
  return`<div class="dr-field${empty?" dr-empty":""}"><span class="dr-label">${label}</span><span class="dr-val">${empty?"—":esc(display)}</span></div>`;
}

function renderRosterDetail(r,answers){
  const count=getRosterCount(r,answers);
  const title=esc(txt(r.title)||r.name);
  const rowLabel=i=>r.rowTitle?`${esc(txt(r.rowTitle))} #${i+1}`:`Baris #${i+1}`;
  let html=`<div class="dr-roster"><div class="dr-roster-title">${title}</div>`;
  if(count<=0){html+=`<div class="dr-roster-empty">Tidak ada data</div>`;}
  else{
    for(let i=0;i<count;i++){
      const rp=`${r.name}#${i}#`;
      html+=`<div class="dr-row"><div class="dr-row-num">${rowLabel(i)}</div>${renderNodes(r.components||[],answers,rp)}</div>`;
    }
  }
  return html+`</div>`;
}

function renderFlatDetail(answers){
  const entries=Object.entries(answers).filter(([k])=>!k.includes("#"));
  if(!entries.length)return'<div class="empty-state">Tidak ada data</div>';
  return`<div class="dr-block">`+entries.map(([k,v])=>
    `<div class="dr-field"><span class="dr-label dr-flat-key">${esc(k)}</span><span class="dr-val">${esc(String(v))}</span></div>`
  ).join("")+`</div>`;
}

/* ---- helpers ---- */
function parseAnswers(raw){
  if(typeof raw==="object"&&raw!==null)return raw;
  try{return JSON.parse(raw)||{};}catch{return{};}
}

function formatDate(iso){
  return new Date(iso).toLocaleString("id-ID",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});
}

function getPreview(answers){
  const parts=[];
  if(!SCHEMA){
    for(const[k,v]of Object.entries(answers)){
      if(parts.length>=3)break;
      if(!k.includes("#")&&v!=null&&v!=="")parts.push(String(v));
    }
    return parts.join(" · ");
  }
  function walk(comps){
    for(const c of comps){
      if(parts.length>=3)return;
      if(c.kind==="field"&&c.type!=="note"&&c.type!=="markdown"&&c.type!=="hidden"&&c.type!=="calculated"){
        const v=answers[c.name];
        if(v!=null&&v!==""&&!(Array.isArray(v)&&!v.length))
          parts.push(Array.isArray(v)?v.join(", "):String(v));
      }else if(c.components)walk(c.components);
    }
  }
  for(const p of SCHEMA.pages||[]){if(parts.length>=3)break;walk(p.components||[]);}
  return parts.join(" · ");
}

function formatFieldValue(c,val,answers){
  if(val==null||val==="")return null;
  if(Array.isArray(val)){
    if(!val.length)return null;
    return val.map(v=>getOptionLabel(c,v)).join(", ");
  }
  if(c.type==="boolean")return(val==="true"||val===true)?"Ya":"Tidak";
  if(c.type==="select"||c.type==="radio")return getOptionLabel(c,val);
  if(c.type==="calculated")return String(val);
  return String(val);
}

function getOptionLabel(c,val){
  if(c.optionsRef&&SCHEMA){
    const t=(SCHEMA.referenceData||{})[c.optionsRef];
    if(t&&t.items){const item=t.items.find(it=>String(it.code)===String(val));if(item)return txt(item.label);}
  }
  if(c.options){const opt=c.options.find(o=>String(o.value)===String(val));if(opt)return txt(opt.label)||String(val);}
  return String(val);
}

function getRosterCount(r,answers){
  if(r.countFrom){
    const cf=Math.floor(Number(answers[r.countFrom]));
    if(!Number.isFinite(cf)||cf<0)return 0;
    if(r.max!=null&&r.max!==""&&cf>Number(r.max))return Number(r.max);
    return cf;
  }
  const stored=answers[r.name+"#count"];
  if(stored!=null){const n=Math.floor(Number(stored));return Number.isFinite(n)&&n>=0?n:0;}
  // infer dari key yang ada
  let max=-1;
  const prefix=r.name+"#";
  for(const k of Object.keys(answers)){
    if(k.startsWith(prefix)&&k!==r.name+"#count"){
      const m=k.slice(prefix.length).match(/^(\d+)#/);
      if(m)max=Math.max(max,+m[1]);
    }
  }
  return max+1;
}

async function downloadCsv(){
  try{
    const r=await fetch("/api/forms/"+FORM_ID+"/responses.csv",{headers:H});
    if(!r.ok){const d=await r.json().catch(()=>({}));throw new Error(d.error||"Gagal");}
    const blob=await r.blob();
    const url=URL.createObjectURL(blob);
    const a=document.createElement("a");a.href=url;a.download="responses-"+FORM_ID+".csv";a.click();
    URL.revokeObjectURL(url);
  }catch(e){alert(e.message);}
}

init();
</script>
</body>
</html>
