<!doctype html>
<html lang="id">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Detail Jawaban · eForm</title>
    <style>
      :root {
        --ink: #13171e;
        --ink-soft: #4a525e;
        --muted: #79828f;
        --surface: #eef1f5;
        --panel: #fff;
        --panel-2: #f7f9fb;
        --line: #dfe4ea;
        --line-2: #eef1f5;
        --accent: #0e7490;
        --accent-ink: #0b5563;
        --accent-soft: #d6edf1;
        --ok: #15803d;
        --ok-soft: #dcfce7;
        --warn-soft: #fef9c3;
        --warn-ink: #854d0e;
        --roster: #047857;
        --radius: 10px;
        --radius-s: 7px;
        --shadow:
          0 1px 3px rgba(19, 23, 30, 0.07),
          0 8px 28px -16px rgba(19, 23, 30, 0.22);
        --sans:
          ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, Inter,
          sans-serif;
        --mono:
          ui-monospace, "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        min-height: 100%;
        background: var(--surface);
        font-family: var(--sans);
        color: var(--ink);
        font-size: 14px;
        line-height: 1.5;
        -webkit-font-smoothing: antialiased;
      }
      button {
        font-family: inherit;
        cursor: pointer;
      }

      /* topbar */
      .topbar {
        position: sticky;
        top: 0;
        z-index: 10;
        background: var(--panel);
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 18px;
        min-height: 50px;
      }
      .topbar-title {
        font-weight: 600;
        font-size: 15px;
        flex: 1;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .btn {
        border: 1px solid var(--line);
        background: var(--panel);
        color: var(--ink);
        padding: 7px 13px;
        border-radius: var(--radius-s);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        transition: 0.12s;
      }
      .btn:hover {
        border-color: #c6cdd6;
        background: var(--panel-2);
      }
      .btn.danger {
        border-color: #fca5a5;
        color: #b91c1c;
        background: #fff5f5;
      }
      .btn.danger:hover {
        background: #fee2e2;
        border-color: #f87171;
      }

      /* status badge */
      .st-badge {
        font-size: 11.5px;
        padding: 4px 10px;
        border-radius: 999px;
        font-weight: 700;
        flex: none;
      }
      .st-submitted {
        background: var(--ok-soft);
        color: var(--ok);
      }
      .st-draft {
        background: var(--warn-soft);
        color: var(--warn-ink);
      }
      .ro-badge {
        background: #f1f5f9;
        color: #475569;
        font-size: 11.5px;
        padding: 4px 10px;
        border-radius: 999px;
        font-weight: 600;
        flex: none;
      }

      /* layout */
      .shell {
        display: flex;
        min-height: calc(100vh - 50px);
      }
      .sidebar {
        width: 200px;
        flex: none;
        padding: 14px 10px;
        background: var(--panel);
        border-right: 1px solid var(--line);
        position: sticky;
        top: 50px;
        height: calc(100vh - 50px);
        overflow-y: auto;
      }
      .sidebar-h {
        font-family: var(--mono);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.09em;
        text-transform: uppercase;
        color: var(--muted);
        padding: 0 6px;
        margin-bottom: 8px;
      }
      .pg-item {
        padding: 8px 10px;
        border-radius: var(--radius-s);
        font-size: 12.5px;
        font-weight: 500;
        cursor: pointer;
        margin-bottom: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .pg-item:hover {
        background: var(--panel-2);
      }
      .pg-item.active {
        background: var(--accent-soft);
        color: var(--accent-ink);
      }
      .content {
        flex: 1;
        padding: 28px 20px 80px;
        max-width: 760px;
        margin: 0 auto;
        width: 100%;
      }

      /* meta card */
      .meta-card {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        padding: 14px 18px;
        margin-bottom: 24px;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 10px;
        box-shadow: var(--shadow);
      }
      .meta-who {
        font-weight: 600;
        font-size: 14px;
      }
      .meta-email {
        font-size: 12.5px;
        color: var(--muted);
      }
      .meta-time {
        font-size: 12px;
        color: var(--muted);
        margin-left: auto;
      }

      /* page title */
      .page-title {
        font-size: 18px;
        font-weight: 700;
        margin: 0 0 18px;
        color: var(--ink);
      }

      /* field display */
      .rv-block {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius);
        box-shadow: var(--shadow);
        padding: 16px 18px;
        margin-bottom: 14px;
      }
      .rv-block-title {
        font-weight: 700;
        font-size: 14px;
        margin-bottom: 12px;
        color: var(--ink);
      }
      .rv-section {
        border: 1.5px solid var(--line);
        border-radius: 9px;
        padding: 12px 14px;
        margin-bottom: 12px;
        background: var(--panel-2);
      }
      .rv-section-title {
        font-weight: 600;
        font-size: 13px;
        color: var(--ink-soft);
        margin-bottom: 10px;
      }
      .rv-field {
        padding: 8px 0;
        border-bottom: 1px solid var(--line-2);
        display: flex;
        flex-direction: column;
        gap: 3px;
      }
      .rv-field:last-child {
        border-bottom: none;
        padding-bottom: 0;
      }
      .rv-label {
        font-size: 12px;
        color: var(--muted);
        font-weight: 500;
      }
      .rv-answer {
        font-size: 13.5px;
        font-weight: 500;
        color: var(--ink);
        word-break: break-word;
      }
      .rv-answer.empty {
        color: var(--muted);
        font-style: italic;
        font-weight: 400;
      }
      .rv-answer-box {
        background: var(--surface);
        border: 1px solid var(--line);
        border-radius: 7px;
        padding: 8px 11px;
        font-size: 13px;
        color: var(--ink);
        min-height: 36px;
        word-break: break-word;
      }
      .rv-photo-wrap {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .rv-photo-img {
        display: block;
        max-width: 100%;
        max-height: 420px;
        border-radius: 8px;
        border: 1px solid var(--line);
        background: #fff;
        object-fit: contain;
        box-shadow: 0 1px 2px rgba(19, 23, 30, 0.06);
      }
      .rv-photo-link {
        font-size: 12px;
        color: var(--accent-ink);
        text-decoration: none;
        font-weight: 600;
        word-break: break-all;
      }
      .rv-choice-list {
        display: flex;
        flex-direction: column;
        gap: 5px;
        margin-top: 2px;
      }
      .rv-choice-item {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
        padding: 5px 10px;
        border-radius: 6px;
      }
      .rv-choice-item.selected {
        background: var(--accent-soft);
        color: var(--accent-ink);
        font-weight: 600;
      }
      .rv-choice-item.unsel {
        color: var(--muted);
      }
      .rv-choice-icon {
        width: 16px;
        height: 16px;
        border-radius: 50%;
        border: 2px solid;
        display: flex;
        align-items: center;
        justify-content: center;
        flex: none;
      }
      .rv-choice-item.selected .rv-choice-icon {
        border-color: var(--accent);
        background: var(--accent);
      }
      .rv-choice-item.unsel .rv-choice-icon {
        border-color: var(--line);
      }
      .rv-choice-item.selected .rv-choice-icon::after {
        content: "";
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: #fff;
      }
      .rv-checkbox-icon {
        width: 16px;
        height: 16px;
        border-radius: 4px;
        border: 2px solid;
        display: flex;
        align-items: center;
        justify-content: center;
        flex: none;
      }
      .rv-choice-item.selected .rv-checkbox-icon {
        border-color: var(--accent);
        background: var(--accent);
      }
      .rv-choice-item.unsel .rv-checkbox-icon {
        border-color: var(--line);
      }
      .rv-choice-item.selected .rv-checkbox-icon::after {
        content: "✓";
        font-size: 10px;
        color: #fff;
        font-weight: 700;
      }

      /* roster */
      .rv-roster {
        border: 1.5px dashed var(--roster);
        border-radius: 10px;
        padding: 14px;
        margin-bottom: 14px;
        background: #eefaf3;
      }
      .rv-roster-title {
        font-weight: 700;
        font-size: 13.5px;
        color: var(--roster);
        margin-bottom: 10px;
      }
      .rv-row {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 12px 14px;
        margin-bottom: 8px;
      }
      .rv-row:last-child {
        margin-bottom: 0;
      }
      .rv-row-num {
        font-family: var(--mono);
        font-size: 10.5px;
        font-weight: 700;
        color: var(--muted);
        margin-bottom: 8px;
      }
      .rv-empty {
        font-size: 12.5px;
        color: var(--muted);
        font-style: italic;
      }
      .rv-photo {
        max-width: 280px;
        max-height: 220px;
        border-radius: var(--radius-s);
        border: 1.5px solid var(--line);
        object-fit: cover;
        display: block;
        cursor: zoom-in;
      }
      .rv-photo-wrap {
        display: flex;
        flex-direction: column;
        gap: 6px;
      }
      .rv-note {
        font-size: 13px;
        line-height: 1.6;
        color: var(--ink-soft);
        padding: 8px 0;
        border-bottom: 1px solid var(--line-2);
      }
      .rv-note:last-child {
        border-bottom: none;
      }
      .rv-note p,
      .rv-note ul,
      .rv-note ol {
        margin: 2px 0 6px;
      }
      .rv-note ul,
      .rv-note ol {
        padding-left: 20px;
      }
      .rv-note code {
        background: var(--panel-2);
        padding: 1px 4px;
        border-radius: 3px;
        font-size: 12px;
        font-family: var(--mono);
      }
      .rv-note blockquote {
        border-left: 3px solid var(--line);
        margin: 4px 0;
        padding-left: 10px;
        color: var(--muted);
      }

      /* fixed page nav footer */
      .pg-foot {
        position: fixed;
        bottom: 0;
        left: 200px;
        right: 0;
        z-index: 20;
        background: var(--panel);
        border-top: 1px solid var(--line);
        padding: 0 20px;
        box-shadow: 0 -2px 16px rgba(19, 23, 30, 0.06);
      }
      .pg-foot-in {
        max-width: 760px;
        margin: 0 auto;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        padding: 12px 0 14px;
      }
      .pg-prog {
        font-size: 12.5px;
        color: var(--muted);
        font-weight: 500;
      }

      @media (max-width: 680px) {
        .sidebar {
          display: none;
        }
        .content {
          padding: 16px 14px 80px;
        }
        .pg-foot {
          left: 0;
        }
      }
      .photo-modal {
        display: none;
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(0, 0, 0, 0.85);
        align-items: center;
        justify-content: center;
        cursor: zoom-out;
      }
      .photo-modal.open {
        display: flex;
      }
      .photo-modal img {
        max-width: 92vw;
        max-height: 92vh;
        object-fit: contain;
        border-radius: 8px;
        box-shadow: 0 8px 40px rgba(0, 0, 0, 0.5);
      }
    </style>
  </head>
  <body>
    <div class="photo-modal" id="photoModal" onclick="closePhotoModal()">
      <img id="photoModalImg" src="" alt="" />
    </div>
    <header class="topbar">
      <span class="ro-badge">Hanya Baca</span>
      <span class="topbar-title" id="topTitle">Memuat…</span>
      <button
        class="btn danger"
        id="btnDelete"
        hidden
        onclick="deleteResponse()"
      >
        Hapus Jawaban
      </button>
      <button class="btn" onclick="window.close()">✕ Tutup</button>
    </header>
    <div class="shell">
      <nav class="sidebar" id="sidebar" hidden>
        <div class="sidebar-h">Halaman</div>
        <div id="pgList"></div>
      </nav>
      <div class="content" id="content">
        <div style="padding: 40px; text-align: center; color: var(--muted)">
          Memuat…
        </div>
      </div>
    </div>
    <div class="pg-foot" id="pgFoot" hidden>
      <div class="pg-foot-in" id="pgFootIn"></div>
    </div>
    <script>
      const TOKEN = localStorage.getItem("eform_token");
      if (!TOKEN) {
        document.getElementById("content").innerHTML =
          '<div style="padding:40px;text-align:center;color:#b91c1c">Sesi habis. Silakan login ulang.</div>';
      }

      const params = new URLSearchParams(location.search);
      const FORM_ID = params.get("form");
      const RESP_ID = params.get("resp");
      if (!FORM_ID || !RESP_ID) {
        document.getElementById("content").innerHTML =
          '<div style="padding:40px;text-align:center;color:#b91c1c">Parameter tidak lengkap.</div>';
      }

      const H = { Authorization: "Bearer " + TOKEN };
      const esc = (s) =>
        String(s ?? "").replace(
          /[&<>"]/g,
          (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" })[c],
        );
      const txt = (v) =>
        v == null
          ? ""
          : typeof v === "object"
            ? v.id || Object.values(v)[0] || ""
            : String(v);
      const INTERP_RE = /\{\{\s*([^}]+?)\s*\}\}|\$\{\s*([^}]+?)\s*\}/g;

      let SCHEMA = null,
        RESP = null,
        CUR_PG = 0;

      async function api(path) {
        const r = await fetch(path, {
          headers: { ...H, "Content-Type": "application/json" },
        });
        if (r.status === 401) {
          localStorage.removeItem("eform_token");
          location.replace("/login");
          throw new Error("sesi habis");
        }
        const data = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(data.error || "HTTP " + r.status);
        return data;
      }

      async function init() {
        try {
          const [form, resp, me] = await Promise.all([
            api("/api/forms/" + FORM_ID),
            api("/api/forms/" + FORM_ID + "/responses/" + RESP_ID),
            api("/api/auth/me"),
          ]);
          SCHEMA = form.schema;
          RESP = resp;
          const title = txt(form.title) || "Kuesioner";
          document.title = "Jawaban · " + title;
          document.getElementById("topTitle").textContent = title;
          if (me && (me.role === "superadmin" || me.role === "admin")) {
            document.getElementById("btnDelete").hidden = false;
          }
          await prefetchApiOptions(parseAnswers(resp.answers));
          CUR_PG = 0;
          renderPage();
        } catch (e) {
          document.getElementById("content").innerHTML =
            `<div style="padding:40px;text-align:center;color:#b91c1c">${esc(e.message)}</div>`;
        }
      }

      function deleteResponse() {
        const ovl = document.createElement("div");
        ovl.style.cssText =
          "position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.45)";
        ovl.innerHTML = `<div style="background:var(--panel);border-radius:12px;padding:28px 24px;max-width:380px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.18)">
          <div style="font-weight:700;font-size:15px;margin-bottom:10px;color:var(--ink)">Hapus Jawaban</div>
          <div style="font-size:13.5px;color:var(--ink-soft);margin-bottom:20px">Hapus jawaban ini secara permanen? Tindakan ini tidak dapat dibatalkan.</div>
          <div style="display:flex;gap:10px;justify-content:flex-end">
            <button id="delCfCancel" style="padding:8px 16px;border:1px solid var(--line);border-radius:7px;background:var(--panel);color:var(--ink);font-family:inherit;font-size:13px;cursor:pointer">Batal</button>
            <button id="delCfOk" style="padding:8px 16px;border:none;border-radius:7px;background:#b91c1c;color:#fff;font-family:inherit;font-size:13px;font-weight:600;cursor:pointer">Hapus</button>
          </div>
        </div>`;
        document.body.appendChild(ovl);
        ovl.querySelector("#delCfCancel").onclick = () => ovl.remove();
        ovl.querySelector("#delCfOk").onclick = () => {
          ovl.remove();
          doDeleteResponse();
        };
      }

      async function doDeleteResponse() {
        const btn = document.getElementById("btnDelete");
        if (btn) {
          btn.disabled = true;
          btn.textContent = "Menghapus…";
        }
        try {
          const r = await fetch(`/api/forms/${FORM_ID}/responses/${RESP_ID}`, {
            method: "DELETE",
            headers: H,
          });
          if (r.status === 401) {
            localStorage.removeItem("eform_token");
            location.replace("/login");
            return;
          }
          const data = await r.json().catch(() => ({}));
          if (!r.ok) throw new Error(data.error || "HTTP " + r.status);
          document.getElementById("topTitle").textContent = "Jawaban Dihapus";
          document.getElementById("content").innerHTML =
            `<div style="padding:80px 20px;text-align:center">
            <div style="font-size:48px;margin-bottom:16px;color:var(--ok)">✓</div>
            <div style="font-weight:700;font-size:16px;color:var(--ink)">Jawaban berhasil dihapus.</div>
            <div style="color:var(--muted);margin-top:8px;font-size:13px">Anda dapat menutup tab ini.</div>
          </div>`;
          document.getElementById("pgFoot").hidden = true;
          document.getElementById("sidebar").hidden = true;
          if (btn) btn.hidden = true;
          window.close();
        } catch (e) {
          if (btn) {
            btn.disabled = false;
            btn.textContent = "Hapus Jawaban";
          }
          const ovl = document.createElement("div");
          ovl.style.cssText =
            "position:fixed;inset:0;z-index:999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,.45)";
          ovl.innerHTML = `<div style="background:var(--panel);border-radius:12px;padding:28px 24px;max-width:380px;width:90%;box-shadow:0 8px 40px rgba(0,0,0,.18)">
            <div style="font-weight:700;font-size:15px;margin-bottom:10px;color:#b91c1c">Gagal Menghapus</div>
            <div style="font-size:13.5px;color:var(--ink-soft);margin-bottom:20px">${esc(e.message)}</div>
            <div style="display:flex;justify-content:flex-end"><button onclick="this.closest('div[style]').remove()" style="padding:8px 16px;border:1px solid var(--line);border-radius:7px;background:var(--panel);color:var(--ink);font-family:inherit;font-size:13px;cursor:pointer">Tutup</button></div>
          </div>`;
          document.body.appendChild(ovl);
        }
      }

      function renderPage() {
        const answers = parseAnswers(RESP.answers);
        const meta = parseAnswers(RESP.meta);
        const pages = (SCHEMA && SCHEMA.pages) || [];
        if (CUR_PG >= pages.length) CUR_PG = pages.length - 1;
        if (CUR_PG < 0) CUR_PG = 0;

        // Sidebar
        if (pages.length > 1) {
          const sidebar = document.getElementById("sidebar");
          sidebar.hidden = false;
          document.getElementById("pgList").innerHTML = pages
            .map(
              (p, i) =>
                `<div class="pg-item${i === CUR_PG ? " active" : ""}" onclick="goPage(${i})">${esc(txt(p.title) || p.name || "Halaman " + (i + 1))}</div>`,
            )
            .join("");
        }

        // Status badge
        const isDraft = RESP.status === "draft";
        const badge = isDraft
          ? `<span class="st-badge st-draft">Draf</span>`
          : `<span class="st-badge st-submitted">Terkirim</span>`;

        // Meta card
        const nameStr = meta.name ? esc(meta.name) : "";
        const emailStr = meta.email ? esc(meta.email) : "";
        const timeStr = formatDate(RESP.submittedAt);
        const metaCard = `<div class="meta-card">
          ${badge}
          ${nameStr ? `<span class="meta-who">${nameStr}</span>` : ""}
          ${emailStr ? `<span class="meta-email">${emailStr}</span>` : ""}
          <span class="meta-time">${timeStr}</span>
        </div>`;

        let body = "";
        if (pages.length) {
          const p = pages[CUR_PG];
          body += `<div class="page-title">${esc(rowInterp(txt(p.title) || p.name || "Halaman " + (CUR_PG + 1), answers, ""))}</div>`;
          body += renderNodes(p.components || [], answers, "");
        } else {
          body = renderFlatAnswers(answers);
        }

        document.getElementById("content").innerHTML = metaCard + body;

        // Fixed bottom nav footer
        const foot = document.getElementById("pgFoot");
        if (pages.length > 1) {
          foot.hidden = false;
          document.getElementById("pgFootIn").innerHTML =
            `<button class="btn" ${CUR_PG === 0 ? "disabled" : ""} onclick="goPage(${CUR_PG - 1})">← Sebelumnya</button>` +
            `<span class="pg-prog">Halaman ${CUR_PG + 1} / ${pages.length}</span>` +
            `<button class="btn" ${CUR_PG >= pages.length - 1 ? "disabled" : ""} onclick="goPage(${CUR_PG + 1})">Selanjutnya →</button>`;
        } else {
          foot.hidden = true;
        }

        window.scrollTo({ top: 0, behavior: "instant" });
      }

      function goPage(idx) {
        CUR_PG = idx;
        renderPage();
      }

      /* ---- expression engine (untuk evalVisible visibleWhen) ---- */
      const Expr = (function () {
        const FUNCS = new Set([
          "isempty",
          "notempty",

            .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
            .replace(/(^|[^*])\*([^*]+)\*/g, "$1<em>$2</em>")
            .replace(/\[([^\]]+)\]\(([^)]+)\)/g, (_, t, u) => {
              const s = /^https?:\/\//.test(u) || u.startsWith("/") ? u : "#";
              return `<a href="${s}" target="_blank" rel="noopener noreferrer">${t}</a>`;
            });
        const L = String(src).replace(/\r\n/g, "\n").split("\n");
        let h = "",
          i = 0;
        while (i < L.length) {
          const l = L[i];
          const hm = l.match(/^\s*(#{1,6})\s+(.*)/);
          if (hm) {
            h += `<h${hm[1].length}>${inl(hm[2])}</h${hm[1].length}>`;
            i++;
            continue;
          }
          if (/^\s*[-*]\s+/.test(l)) {
            const it = [];
            while (i < L.length && /^\s*[-*]\s+/.test(L[i])) {
              it.push(`<li>${inl(L[i].replace(/^\s*[-*]\s+/, ""))}</li>`);
              i++;
            }
            h += `<ul>${it.join("")}</ul>`;
            continue;
          }
          if (/^\s*\d+\.\s+/.test(l)) {
            const it = [];
            while (i < L.length && /^\s*\d+\.\s+/.test(L[i])) {
              it.push(`<li>${inl(L[i].replace(/^\s*\d+\.\s+/, ""))}</li>`);
              i++;
            }
            h += `<ol>${it.join("")}</ol>`;
            continue;
          }
          if (/^\s*>\s?/.test(l)) {
            const q = [];
            while (i < L.length && /^\s*>\s?/.test(L[i])) {
              q.push(inl(L[i].replace(/^\s*>\s?/, "")));
              i++;
            }
            h += `<blockquote>${q.join("<br>")}</blockquote>`;
            continue;
          }
          if (l.trim() === "") {
            h += "<p></p>";
            i++;
            continue;
          }
          h += `<p>${inl(l)}</p>`;
          i++;
        }
        return h;
      }
      let apiCache = {};
      function getPath(obj, path) {
        try {
          return path.split(".").reduce((o, k) => o && o[k], obj);
        } catch {
          return null;
        }
      }
      function buildApiUrl(urlTpl, answers, rp) {
        if (!urlTpl) return "";
        return urlTpl.replace(/\{([^}]+)\}/g, (_, k) => {
          const v =
            answers &&
            ((rp || "") + k in answers
              ? answers[(rp || "") + k]
              : k in answers
                ? answers[k]
                : "");
          return encodeURIComponent(String(v || ""));
        });
      }
      async function prefetchApiOptions(answers) {
        if (!SCHEMA || !answers) return;
        const jobs = new Map();
        function collectFields(comps, rp) {
          (comps || []).forEach((c) => {
            if (c.kind === "block" || c.kind === "section")
              collectFields(c.components || [], rp);
            else if (c.kind === "roster") {
              const count = getRosterCount(c, answers, rp);
              for (let i = 0; i < count; i++)
                collectFields(c.components || [], rosterRowPrefix(c, i, rp));
            } else if (c.optionsApi && c.optionsApi.url) {
              const url = buildApiUrl(c.optionsApi.url, answers, rp);
              if (url && !apiCache[url]) jobs.set(url, c.optionsApi);
            }
          });
        }
        (SCHEMA.pages || []).forEach((pg) =>
          collectFields(pg.components || [], ""),
        );
        await Promise.all(
          [...jobs.entries()].map(async ([url, apiCfg]) => {
            try {
              const data = await fetch(url, { headers: H }).then((r) =>
                r.ok ? r.json() : null,
              );
              if (!data) return;
              let arr = apiCfg.path
                ? getPath(data, apiCfg.path)
                : Array.isArray(data)
                  ? data
                  : data.data || data.items || data.results || [];
              const vf = apiCfg.valueField || "code",
                lf = apiCfg.labelField || "label";
              apiCache[url] = (arr || []).map((it) => ({
                value: String(it[vf]),
                label: txt(it[lf]) || String(it[vf]),
              }));
            } catch (_) {}
          }),
        );
      }
      function ancestorPrefixes(rowPrefix) {
        const prefixes = [];
        let p = String(rowPrefix || "");
        while (p) {
          prefixes.push(p);
          const m = p.match(/^(.*?)([^#]+#\d+#)$/);
          if (!m) break;
          p = m[1];
        }
        return prefixes;
      }
      function indexFromScopePrefix(prefix) {
        const m = String(prefix || "").match(/#(\d+)#$/);
        return m ? Number(m[1]) + 1 : null;
      }
      function rowInterp(text, answers, rowPrefix) {
        if (!text) return text;
        return String(text).replace(INTERP_RE, (_, a, b) => {
          const name = (a || b).trim();
          if (name === "index") {
            for (const p of ancestorPrefixes(rowPrefix)) {
              const idx = indexFromScopePrefix(p);
              if (idx != null) return String(idx);
            }
            return "";
          }
          for (const p of ancestorPrefixes(rowPrefix)) {
            const key = p + name;
            if (key in answers) return String(answers[key]);
          }
          if (name in answers) return String(answers[name]);
          return "";
        });
      }
      function formatDate(iso) {
        try {
          return new Date(iso).toLocaleString("id-ID", {
            day: "2-digit",
            month: "short",
            year: "numeric",
            hour: "2-digit",
            minute: "2-digit",
          });
        } catch {
          return iso || "";
        }
      }
      function valStr(v) {
        if (v == null || v === "") return "";
        if (Array.isArray(v)) return v.join(", ");
        return String(v);
      }
      function getOptions(c, answers, rp) {
        const opts = [];
        const refKey = c.optionsRef || c.optionsTable;
        if (refKey && SCHEMA) {
          const t = (SCHEMA.referenceData || {})[refKey];
          if (t && t.items)
            t.items.forEach((it) =>
              opts.push({ value: String(it.code), label: txt(it.label) }),
            );
        }
        if (!opts.length && c.options)
          c.options.forEach((o) =>
            opts.push({
              value: String(o.value),
              label: txt(o.label) || String(o.value),
            }),
          );
        if (!opts.length && c.optionsApi && c.optionsApi.url) {
          const url = buildApiUrl(c.optionsApi.url, answers, rp);
          const cached = apiCache[url];
          if (cached) cached.forEach((o) => opts.push(o));
        }
        return opts;
      }
      function formatScalarValue(c, val) {
        if (val == null || val === "") return null;
        return String(val);
      }
      function getMediaSource(val) {
        if (!val) return "";
        if (Array.isArray(val)) return getMediaSource(val[0]);
        if (typeof val === "object") {
          return (
            val.dataUrl || val.url || val.src || val.value || val.base64 || ""
          );
        }
        const s = String(val);
        if (/^data:image\//i.test(s)) return s;
        if (
          /^https?:\/\//i.test(s) ||
          s.startsWith("/") ||
          s.startsWith("blob:")
        )
          return s;
        return s.startsWith("base64,")
          ? "data:image/*;base64," + s.slice(7)
          : "";
      }
      function getRosterCount(r, answers, rowPrefix) {
        const from = String(r.countFrom || "").trim();
        if (from) {
          const raw =
            rowPrefix && rowPrefix + from in answers
              ? answers[rowPrefix + from]
              : answers[from];
          const cf = Math.floor(Number(raw));
          if (!Number.isFinite(cf) || cf < 0) return 0;
          if (r.max != null && r.max !== "" && cf > Number(r.max))
            return Number(r.max);
          return cf;
        }
        const stored = answers[rosterCountKey(r, rowPrefix)];
        if (stored != null) {
          const n = Math.floor(Number(stored));
          return Number.isFinite(n) && n >= 0 ? n : 0;
        }
        let max = -1;
        const prefix = rosterScopePrefix(r, rowPrefix);
        for (const k of Object.keys(answers)) {
          if (k.startsWith(prefix) && k !== rosterCountKey(r, rowPrefix)) {
            const m = k.slice(prefix.length).match(/^(\d+)#/);
            if (m) max = Math.max(max, +m[1]);
          }
        }
        return max + 1;
      }
      function rosterScopePrefix(r, rowPrefix) {
        return `${rowPrefix || ""}${r.name}#`;
      }
      function rosterCountKey(r, rowPrefix) {
        return `${rosterScopePrefix(r, rowPrefix)}count`;
      }
      function rosterRowPrefix(r, rowIdx, rowPrefix) {
        return `${rosterScopePrefix(r, rowPrefix)}${rowIdx}#`;
      }

      if (FORM_ID && RESP_ID) init();
    </script>
  </body>
