<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Detail Jawaban · eForm</title>
<style>
:root{
  --ink:#13171e;--ink-soft:#4a525e;--muted:#79828f;
  --surface:#eef1f5;--panel:#fff;--panel-2:#f7f9fb;
  --line:#dfe4ea;--line-2:#eef1f5;
  --accent:#0e7490;--accent-ink:#0b5563;--accent-soft:#d6edf1;
  --ok:#15803d;--ok-soft:#dcfce7;
  --warn-soft:#fef9c3;--warn-ink:#854d0e;
  --roster:#047857;
  --radius:10px;--radius-s:7px;
  --shadow:0 1px 3px rgba(19,23,30,.07),0 8px 28px -16px rgba(19,23,30,.22);
  --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Inter,sans-serif;
  --mono:ui-monospace,"SF Mono","JetBrains Mono",Menlo,Consolas,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%;background:var(--surface);font-family:var(--sans);color:var(--ink);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased}
button{font-family:inherit;cursor:pointer}

/* topbar */
.topbar{position:sticky;top:0;z-index:10;background:var(--panel);border-bottom:1px solid var(--line);display:flex;align-items:center;gap:10px;padding:10px 18px;min-height:50px}
.topbar-title{font-weight:600;font-size:15px;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:7px 13px;border-radius:var(--radius-s);font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:.12s}
.btn:hover{border-color:#c6cdd6;background:var(--panel-2)}

/* status badge */
.st-badge{font-size:11.5px;padding:4px 10px;border-radius:999px;font-weight:700;flex:none}
.st-submitted{background:var(--ok-soft);color:var(--ok)}
.st-draft{background:var(--warn-soft);color:var(--warn-ink)}
.ro-badge{background:#f1f5f9;color:#475569;font-size:11.5px;padding:4px 10px;border-radius:999px;font-weight:600;flex:none}

/* layout */
.shell{display:flex;min-height:calc(100vh - 50px)}
.sidebar{width:200px;flex:none;padding:14px 10px;background:var(--panel);border-right:1px solid var(--line);position:sticky;top:50px;height:calc(100vh - 50px);overflow-y:auto}
.sidebar-h{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.09em;text-transform:uppercase;color:var(--muted);padding:0 6px;margin-bottom:8px}
.pg-item{padding:8px 10px;border-radius:var(--radius-s);font-size:12.5px;font-weight:500;cursor:pointer;margin-bottom:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pg-item:hover{background:var(--panel-2)}
.pg-item.active{background:var(--accent-soft);color:var(--accent-ink)}
.content{flex:1;padding:28px 20px 80px;max-width:760px;margin:0 auto;width:100%}

/* meta card */
.meta-card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px 18px;margin-bottom:24px;display:flex;flex-wrap:wrap;align-items:center;gap:10px;box-shadow:var(--shadow)}
.meta-who{font-weight:600;font-size:14px}
.meta-email{font-size:12.5px;color:var(--muted)}
.meta-time{font-size:12px;color:var(--muted);margin-left:auto}

/* page title */
.page-title{font-size:18px;font-weight:700;margin:0 0 18px;color:var(--ink)}

/* field display */
.rv-block{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow);padding:16px 18px;margin-bottom:14px}
.rv-block-title{font-weight:700;font-size:14px;margin-bottom:12px;color:var(--ink)}
.rv-section{border:1.5px solid var(--line);border-radius:9px;padding:12px 14px;margin-bottom:12px;background:var(--panel-2)}
.rv-section-title{font-weight:600;font-size:13px;color:var(--ink-soft);margin-bottom:10px}
.rv-field{padding:8px 0;border-bottom:1px solid var(--line-2);display:flex;flex-direction:column;gap:3px}
.rv-field:last-child{border-bottom:none;padding-bottom:0}
.rv-label{font-size:12px;color:var(--muted);font-weight:500}
.rv-answer{font-size:13.5px;font-weight:500;color:var(--ink);word-break:break-word}
.rv-answer.empty{color:var(--muted);font-style:italic;font-weight:400}
.rv-answer-box{background:var(--surface);border:1px solid var(--line);border-radius:7px;padding:8px 11px;font-size:13px;color:var(--ink);min-height:36px;word-break:break-word}
.rv-choice-list{display:flex;flex-direction:column;gap:5px;margin-top:2px}
.rv-choice-item{display:flex;align-items:center;gap:8px;font-size:13px;padding:5px 10px;border-radius:6px}
.rv-choice-item.selected{background:var(--accent-soft);color:var(--accent-ink);font-weight:600}
.rv-choice-item.unsel{color:var(--muted)}
.rv-choice-icon{width:16px;height:16px;border-radius:50%;border:2px solid;display:flex;align-items:center;justify-content:center;flex:none}
.rv-choice-item.selected .rv-choice-icon{border-color:var(--accent);background:var(--accent)}
.rv-choice-item.unsel .rv-choice-icon{border-color:var(--line)}
.rv-choice-item.selected .rv-choice-icon::after{content:"";width:6px;height:6px;border-radius:50%;background:#fff}
.rv-checkbox-icon{width:16px;height:16px;border-radius:4px;border:2px solid;display:flex;align-items:center;justify-content:center;flex:none}
.rv-choice-item.selected .rv-checkbox-icon{border-color:var(--accent);background:var(--accent)}
.rv-choice-item.unsel .rv-checkbox-icon{border-color:var(--line)}
.rv-choice-item.selected .rv-checkbox-icon::after{content:"✓";font-size:10px;color:#fff;font-weight:700}

/* roster */
.rv-roster{border:1.5px dashed var(--roster);border-radius:10px;padding:14px;margin-bottom:14px;background:#eefaf3}
.rv-roster-title{font-weight:700;font-size:13.5px;color:var(--roster);margin-bottom:10px}
.rv-row{background:var(--panel);border:1px solid var(--line);border-radius:8px;padding:12px 14px;margin-bottom:8px}
.rv-row:last-child{margin-bottom:0}
.rv-row-num{font-family:var(--mono);font-size:10.5px;font-weight:700;color:var(--muted);margin-bottom:8px}
.rv-empty{font-size:12.5px;color:var(--muted);font-style:italic}

/* bottom nav */
.bottom-nav{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:24px;padding-top:18px;border-top:1px solid var(--line)}

@media(max-width:680px){
  .sidebar{display:none}
  .content{padding:16px 14px 60px}
}
</style>
</head>
<body>
<header class="topbar">
  <span class="ro-badge">Hanya Baca</span>
  <span class="topbar-title" id="topTitle">Memuat…</span>
  <button class="btn" onclick="window.close()">✕ Tutup</button>
</header>
<div class="shell">
  <nav class="sidebar" id="sidebar" hidden>
    <div class="sidebar-h">Halaman</div>
    <div id="pgList"></div>
  </nav>
  <div class="content" id="content">
    <div style="padding:40px;text-align:center;color:var(--muted)">Memuat…</div>
  </div>
</div>
<script>
const TOKEN=localStorage.getItem("eform_token");
if(!TOKEN){document.getElementById("content").innerHTML='<div style="padding:40px;text-align:center;color:#b91c1c">Sesi habis. Silakan login ulang.</div>';}

const params=new URLSearchParams(location.search);
const FORM_ID=params.get("form");
const RESP_ID=params.get("resp");
if(!FORM_ID||!RESP_ID){document.getElementById("content").innerHTML='<div style="padding:40px;text-align:center;color:#b91c1c">Parameter tidak lengkap.</div>';}

const H={"Authorization":"Bearer "+TOKEN};
const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));
const txt=v=>v==null?"":(typeof v==="object"?(v.id||Object.values(v)[0]||""):String(v));

let SCHEMA=null, RESP=null, CUR_PG=0;

async function api(path){
  const r=await fetch(path,{headers:{...H,"Content-Type":"application/json"}});
  if(r.status===401){localStorage.removeItem("eform_token");location.replace("/login");throw new Error("sesi habis");}
  const data=await r.json().catch(()=>({}));
  if(!r.ok)throw new Error(data.error||"HTTP "+r.status);
  return data;
}

async function init(){
  try{
    const [form,resp]=await Promise.all([
      api("/api/forms/"+FORM_ID),
      api("/api/forms/"+FORM_ID+"/responses/"+RESP_ID)
    ]);
    SCHEMA=form.schema;
    RESP=resp;
    const title=txt(form.title)||"Kuesioner";
    document.title="Jawaban · "+title;
    document.getElementById("topTitle").textContent=title;
    CUR_PG=0;
    renderPage();
  }catch(e){
    document.getElementById("content").innerHTML=`<div style="padding:40px;text-align:center;color:#b91c1c">${esc(e.message)}</div>`;
  }
}

function renderPage(){
  const answers=parseAnswers(RESP.answers);
  const meta=parseAnswers(RESP.meta);
  const pages=(SCHEMA&&SCHEMA.pages)||[];
  if(CUR_PG>=pages.length)CUR_PG=pages.length-1;
  if(CUR_PG<0)CUR_PG=0;

  // Sidebar
  if(pages.length>1){
    const sidebar=document.getElementById("sidebar");
    sidebar.hidden=false;
    document.getElementById("pgList").innerHTML=pages.map((p,i)=>
      `<div class="pg-item${i===CUR_PG?" active":""}" onclick="goPage(${i})">${esc(txt(p.title)||p.name||"Halaman "+(i+1))}</div>`
    ).join("");
  }

  // Status badge
  const isDraft=RESP.status==="draft";
  const badge=isDraft
    ?`<span class="st-badge st-draft">Draf</span>`
    :`<span class="st-badge st-submitted">Terkirim</span>`;

  // Meta card
  const nameStr=meta.name?esc(meta.name):"";
  const emailStr=meta.email?esc(meta.email):"";
  const timeStr=formatDate(RESP.submittedAt);
  const metaCard=`<div class="meta-card">
    ${badge}
    ${nameStr?`<span class="meta-who">${nameStr}</span>`:""}
    ${emailStr?`<span class="meta-email">${emailStr}</span>`:""}
    <span class="meta-time">${timeStr}</span>
  </div>`;

  // Nav bar
  const nav=pages.length>1?`<div class="nav-bar">
    <button class="btn" ${CUR_PG===0?"disabled":""} onclick="goPage(${CUR_PG-1})">← Sebelumnya</button>
    <span class="nav-prog">Halaman ${CUR_PG+1} / ${pages.length}</span>
    <button class="btn" ${CUR_PG>=pages.length-1?"disabled":""} onclick="goPage(${CUR_PG+1})">Selanjutnya →</button>
  </div>`:"";

  let body="";
  if(pages.length){
    const p=pages[CUR_PG];
    body+=`<div class="page-title">${esc(txt(p.title)||p.name||"Halaman "+(CUR_PG+1))}</div>`;
    body+=renderNodes(p.components||[],answers,"");
    if(pages.length>1){
      body+=`<div class="bottom-nav">
        <button class="btn" ${CUR_PG===0?"disabled":""} onclick="goPage(${CUR_PG-1})">← Sebelumnya</button>
        <span class="nav-prog">Halaman ${CUR_PG+1} / ${pages.length}</span>
        <button class="btn" ${CUR_PG>=pages.length-1?"disabled":""} onclick="goPage(${CUR_PG+1})">Selanjutnya →</button>
      </div>`;
    }
  }else{
    body=renderFlatAnswers(answers);
  }

  document.getElementById("content").innerHTML=metaCard+nav+body;
  window.scrollTo({top:0,behavior:"instant"});
}

function goPage(idx){CUR_PG=idx;renderPage();}

/* ---- render nodes ---- */
function renderNodes(comps,answers,rp){
  return(comps||[]).map(c=>renderNode(c,answers,rp)).join("");
}
function renderNode(c,answers,rp){
  if(c.kind==="block")
    return`<div class="rv-block">${c.title?`<div class="rv-block-title">${esc(txt(c.title))}</div>`:""}${renderNodes(c.components||[],answers,rp)}</div>`;
  if(c.kind==="section")
    return`<div class="rv-section">${c.title?`<div class="rv-section-title">${esc(txt(c.title))}</div>`:""}${renderNodes(c.components||[],answers,rp)}</div>`;
  if(c.kind==="roster")return renderRoster(c,answers,rp);
  return renderField(c,answers,rp);
}

function renderField(c,answers,rp){
  if(c.type==="note"||c.type==="markdown"||c.type==="hidden")return"";
  const key=rp+c.name;
  const val=answers[key];
  const label=esc(txt(c.label)||c.name);
  const desc=c.description?`<div style="font-size:12px;color:var(--muted);margin-bottom:2px">${esc(txt(c.description))}</div>`:"";

  // Radio / select
  if(c.type==="radio"||c.type==="select"){
    const opts=getOptions(c);
    if(opts.length){
      const items=opts.map(o=>{
        const sel=String(val)===String(o.value);
        return`<div class="rv-choice-item ${sel?"selected":"unsel"}">
          <span class="rv-choice-icon"></span>${esc(o.label)}</div>`;
      }).join("");
      return`<div class="rv-field"><div class="rv-label">${label}</div>${desc}<div class="rv-choice-list">${items||"—"}</div></div>`;
    }
  }

  // Checkbox / multi-select
  if(c.type==="checkbox"||c.type==="multiselect"){
    const selected=Array.isArray(val)?val.map(String):(val?[String(val)]:[]);
    const opts=getOptions(c);
    if(opts.length){
      const items=opts.map(o=>{
        const sel=selected.includes(String(o.value));
        return`<div class="rv-choice-item ${sel?"selected":"unsel"}">
          <span class="rv-checkbox-icon"></span>${esc(o.label)}</div>`;
      }).join("");
      return`<div class="rv-field"><div class="rv-label">${label}</div>${desc}<div class="rv-choice-list">${items}</div></div>`;
    }
    // Tanpa opsi — tampilkan nilai mentah
    const display=selected.length?selected.join(", "):"—";
    return`<div class="rv-field"><div class="rv-label">${label}</div>${desc}<div class="rv-answer-box">${esc(display)}</div></div>`;
  }

  // Boolean
  if(c.type==="boolean"){
    const yes=(val==="true"||val===true);
    const items=[{value:"true",label:"Ya"},{value:"false",label:"Tidak"}].map(o=>{
      const sel=String(val)===o.value;
      return`<div class="rv-choice-item ${sel?"selected":"unsel"}"><span class="rv-choice-icon"></span>${o.label}</div>`;
    }).join("");
    return`<div class="rv-field"><div class="rv-label">${label}</div>${desc}<div class="rv-choice-list">${items}</div></div>`;
  }

  // Textarea / text / number / date / dsb
  const display=formatScalarValue(c,val);
  const isEmpty=display==null||display==="";
  if(c.type==="textarea"||c.type==="text_long"){
    return`<div class="rv-field"><div class="rv-label">${label}</div>${desc}<div class="rv-answer-box">${isEmpty?`<span style="color:var(--muted);font-style:italic">—</span>`:esc(display)}</div></div>`;
  }
  return`<div class="rv-field"><div class="rv-label">${label}</div>${desc}<div class="rv-answer${isEmpty?" empty":""}">${isEmpty?"—":esc(display)}</div></div>`;
}

function renderRoster(r,answers,rp){
  rp=rp||"";
  const count=getRosterCount(r,answers,rp);
  const title=esc(txt(r.title)||r.name);
  let html=`<div class="rv-roster"><div class="rv-roster-title">${title} <span style="font-weight:400;font-size:12px">(${count} baris)</span></div>`;
  if(count<=0){html+=`<div class="rv-empty">Tidak ada data</div>`;}
  else{
    const rowLbl=i=>r.rowTitle?`${esc(txt(r.rowTitle))} #${i+1}`:`Baris #${i+1}`;
    for(let i=0;i<count;i++){
      const childRp=rosterRowPrefix(r,i,rp);
      html+=`<div class="rv-row"><div class="rv-row-num">${rowLbl(i)}</div>${renderNodes(r.components||[],answers,childRp)}</div>`;
    }
  }
  return html+`</div>`;
}

function renderFlatAnswers(answers){
  const entries=Object.entries(answers).filter(([k])=>!k.includes("#"));
  if(!entries.length)return`<div class="rv-block"><div class="rv-empty">Tidak ada data</div></div>`;
  return`<div class="rv-block">`+entries.map(([k,v])=>
    `<div class="rv-field"><div class="rv-label" style="font-family:var(--mono);font-size:11.5px">${esc(k)}</div><div class="rv-answer">${esc(valStr(v))}</div></div>`
  ).join("")+`</div>`;
}

/* ---- helpers ---- */
function parseAnswers(raw){
  if(typeof raw==="object"&&raw!==null)return raw;
  try{return JSON.parse(raw)||{};}catch{return{};}
}
function formatDate(iso){
  try{return new Date(iso).toLocaleString("id-ID",{day:"2-digit",month:"short",year:"numeric",hour:"2-digit",minute:"2-digit"});}catch{return iso||"";}
}
function valStr(v){
  if(v==null||v==="")return"";
  if(Array.isArray(v))return v.join(", ");
  return String(v);
}
function getOptions(c){
  const opts=[];
  if(c.optionsRef&&SCHEMA){
    const t=(SCHEMA.referenceData||{})[c.optionsRef];
    if(t&&t.items)t.items.forEach(it=>opts.push({value:String(it.code),label:txt(it.label)}));
  }
  if(!opts.length&&c.options)c.options.forEach(o=>opts.push({value:String(o.value),label:txt(o.label)||String(o.value)}));
  return opts;
}
function formatScalarValue(c,val){
  if(val==null||val==="")return null;
  return String(val);
}
function getRosterCount(r,answers,rowPrefix){
  const from=String(r.countFrom||"").trim();
  if(from){
    const raw=(rowPrefix&&((rowPrefix+from) in answers))?answers[rowPrefix+from]:answers[from];
    const cf=Math.floor(Number(raw));
    if(!Number.isFinite(cf)||cf<0)return 0;
    if(r.max!=null&&r.max!==""&&cf>Number(r.max))return Number(r.max);
    return cf;
  }
  const stored=answers[rosterCountKey(r,rowPrefix)];
  if(stored!=null){const n=Math.floor(Number(stored));return Number.isFinite(n)&&n>=0?n:0;}
  let max=-1;
  const prefix=rosterScopePrefix(r,rowPrefix);
  for(const k of Object.keys(answers)){
    if(k.startsWith(prefix)&&k!==rosterCountKey(r,rowPrefix)){
      const m=k.slice(prefix.length).match(/^(\d+)#/);
      if(m)max=Math.max(max,+m[1]);
    }
  }
  return max+1;
}
function rosterScopePrefix(r,rowPrefix){return `${rowPrefix||""}${r.name}#`;}
function rosterCountKey(r,rowPrefix){return `${rosterScopePrefix(r,rowPrefix)}count`;}
function rosterRowPrefix(r,rowIdx,rowPrefix){return `${rosterScopePrefix(r,rowPrefix)}${rowIdx}#`;}

if(FORM_ID&&RESP_ID)init();
</script>
</body>
</html>
