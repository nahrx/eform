<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard · eForm BPS Kaltim</title>
<link rel="stylesheet" href="/admin.css">
</head>
<body>
<header>
  <h1>eForm · Dashboard</h1>
  <span class="who" id="who"></span>
  <button class="btn primary" onclick="location.href='/builder'">+ Kuesioner baru</button>
  <button class="btn" id="logout">Keluar</button>
</header>
<main>
  <div class="bar"><h2>Daftar Kuesioner</h2><button class="btn" id="refresh">↻ Muat ulang</button></div>
  <table id="tbl"><thead><tr><th>Judul</th><th>Status</th><th>Diperbarui</th><th>Jawaban</th><th></th></tr></thead>
  <tbody id="rows"><tr><td colspan="5" class="empty">Memuat…</td></tr></tbody></table>
</main>

<dialog id="shareDlg">
  <div class="dlg-h" style="justify-content:space-between"><span>Bagikan kuesioner</span><button class="btn" onclick="shareDlg.close()">✕</button></div>
  <div class="dlg-b">
    <div class="muted" id="shareNote"></div>
    <div class="row"><input id="shareLabel" placeholder="Label (opsional, mis. 'Petugas Lapangan')" style="flex:1"></div>
    <div class="row"><label class="muted"><input type="checkbox" id="shareAllow" checked> Terima jawaban</label></div>
    <div class="row"><label class="muted"><input type="checkbox" id="shareMulti"> Izinkan multi-respons (satu akun bisa kirim lebih dari satu jawaban)</label></div>
    <div class="row" style="gap:16px">
      <label class="muted"><input type="radio" name="shareAccess" id="shareAccessPublic" value="public" checked> Publik (siapa saja bisa mengisi)</label>
      <label class="muted"><input type="radio" name="shareAccess" id="shareAccessRestricted" value="restricted"> Terbatas (hanya akun terdaftar)</label>
    </div>
    <div id="restrictedSection" style="display:none;border:1px solid var(--line);border-radius:var(--radius);padding:12px;margin:4px 0 8px;background:var(--surface)">
      <div style="font-size:12px;font-weight:600;margin-bottom:8px;color:var(--muted)">Akun yang diizinkan mengisi</div>
      <div class="row" style="gap:6px">
        <input id="newEmailInput" type="email" placeholder="email@contoh.com" style="flex:2">
        <input id="newEmailNote" placeholder="Catatan (opsional)" style="flex:2">
        <button class="btn" id="btnAddNewEmail" type="button">+ Tambah</button>
      </div>
      <div id="newEmailList" style="margin-top:8px"></div>
    </div>
    <div class="row"><input id="sharePw" type="text" placeholder="Password (opsional)" style="flex:1"></div>
    <button class="btn primary" id="makeShare">Buat tautan share</button>
    <div id="shareList" style="margin-top:14px"></div>
  </div>
</dialog>

<script src="/admin.js"></script>
</body>
</html>
