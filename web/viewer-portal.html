<!doctype html>
<html lang="id">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Portal Akses Form · eForm BPS Kaltim</title>
<style>
:root{
  --ink:#13171e;--ink-soft:#4a525e;--muted:#79828f;
  --surface:#eef1f5;--panel:#fff;--panel-2:#f7f9fb;
  --line:#dfe4ea;--line-2:#eef1f5;
  --accent:#0e7490;--accent-ink:#0b5563;--accent-soft:#d6edf1;
  --ok:#15803d;--ok-soft:#dcfce7;
  --radius:10px;--radius-s:7px;
  --shadow:0 1px 2px rgba(19,23,30,.06),0 8px 24px -16px rgba(19,23,30,.25);
  --sans:ui-sans-serif,system-ui,-apple-system,"Segoe UI",Roboto,Inter,sans-serif;
}
*{box-sizing:border-box}
body{font-family:var(--sans);color:var(--ink);background:var(--surface);font-size:14px;line-height:1.5;margin:0;-webkit-font-smoothing:antialiased}
header{display:flex;align-items:center;gap:10px;padding:12px 20px;background:var(--panel);border-bottom:1px solid var(--line);flex-wrap:wrap}
.login-box{max-width:360px;margin:60px auto;background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:32px 28px;box-shadow:var(--shadow);text-align:center;display:flex;flex-direction:column;gap:16px}
.login-box h2{margin:0;font-size:16px}
.login-box p{margin:0;font-size:13px;color:var(--muted)}
.alert{padding:10px 14px;border-radius:var(--radius-s);font-size:13px;background:#fef2f2;color:#991b1b;border:1px solid #fecaca}
.btn-google{display:inline-flex;align-items:center;gap:8px;background:#fff;border:1px solid var(--line);border-radius:var(--radius-s);padding:10px 18px;font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;color:var(--ink);transition:.12s}
.btn-google:hover{border-color:#c6cdd6;background:var(--panel-2)}
header h1{font-size:15px;font-weight:700;margin:0;flex:none}
.who{font-size:12px;color:var(--muted);flex:1}
.btn{border:1px solid var(--line);background:var(--panel);color:var(--ink);padding:7px 13px;border-radius:var(--radius-s);font-size:13px;font-weight:500;cursor:pointer;text-decoration:none;display:inline-flex;align-items:center;gap:5px;transition:.12s}
.btn:hover{border-color:#c6cdd6;background:var(--panel-2)}
.btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
.btn.primary:hover{background:var(--accent-ink)}
main{max-width:900px;margin:32px auto;padding:0 20px}
h2{font-size:16px;font-weight:700;margin:0 0 16px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:18px 20px;box-shadow:var(--shadow);display:flex;flex-direction:column;gap:12px}
.card-title{font-weight:600;font-size:14px;line-height:1.35}
.card-meta{font-size:11px;color:var(--muted);display:flex;flex-direction:column;gap:3px}
.card-meta span{display:flex;align-items:center;gap:5px}
.badge{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:999px;background:var(--accent-soft);color:var(--accent-ink)}
.empty{color:var(--muted);font-size:13px;text-align:center;padding:40px}
</style>
</head>
<body>
<header>
  <h1>eForm · Portal Akses Form</h1>
  <span class="who" id="who"></span>
  <button class="btn" id="logout">Keluar</button>
</header>
<main>
  <h2>Kuesioner yang Dapat Anda Akses</h2>
  <div id="content"><div class="empty">Memuat…</div></div>
</main>
<script>
const esc=s=>String(s??"").replace(/[&<>"]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;"}[c]));

// Cek apakah ada error dari callback OAuth
const urlP=new URLSearchParams(location.search);
const oauthError=urlP.get("error");
const errorEmail=urlP.get("email");

// Tampilkan halaman login jika belum ada token
const TOKEN=localStorage.getItem("eform_token");
if(!TOKEN){
  showLoginPage();
} else {
  initPortal();
}

function showLoginPage(){
  document.getElementById("who").textContent="";
  document.getElementById("logout").style.display="none";
  document.querySelector("main").innerHTML=`
    <div class="login-box">
      <h2>Portal Akses Form</h2>
      <p>Masuk menggunakan akun Google yang telah didaftarkan sebagai Viewer atau Editor.</p>
      ${oauthError==="not_authorized"?`<div class="alert">Akun Google${errorEmail?" ("+esc(errorEmail)+")":""} tidak terdaftar sebagai akun staf aktif.<br>Hubungi administrator.</div>`:""}
      <a href="/auth/google/viewer" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 18 18"><path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/><path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/><path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/><path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 6.29C4.672 4.163 6.656 3.58 9 3.58z"/></svg>
        Masuk dengan Google
      </a>
    </div>`;
}

function initPortal(){
  const H={"Authorization":"Bearer "+TOKEN,"Content-Type":"application/json"};

  async function api(path,opts={}){
    const r=await fetch(path,{...opts,headers:{...H,...(opts.headers||{})}});
    if(r.status===401){
      localStorage.removeItem("eform_token");localStorage.removeItem("eform_user");
      showLoginPage();throw new Error("sesi habis");
    }
    const data=(r.headers.get("content-type")||"").includes("json")?await r.json():null;
    if(!r.ok)throw new Error((data&&data.error)||("HTTP "+r.status));
    return data;
  }

  (async()=>{
    try{
      const me=await api("/api/auth/me");
      if(me.role==="viewer"){
        document.getElementById("who").textContent=me.username+" · Viewer";
      }else if(me.role==="editor"){
        document.getElementById("who").textContent=me.username+" · Editor";
        location.replace("/admin");
        return;
      }else{
        location.replace("/admin");
        return;
      }
    }catch{return;}
    loadForms(api);
  })();

  document.getElementById("logout").addEventListener("click",()=>{
    localStorage.removeItem("eform_token");localStorage.removeItem("eform_user");
    showLoginPage();
  });
}

async function loadForms(api){
  const el=document.getElementById("content");
  try{
    const {forms}=await api("/api/viewer/my-forms");
    if(!forms||!forms.length){
      el.innerHTML='<div class="empty">Belum ada kuesioner yang dapat diakses.<br>Hubungi administrator untuk mendapatkan akses.</div>';
      return;
    }
    el.innerHTML=`<div class="grid">${forms.map(f=>`
      <div class="card">
        <div class="card-title">${esc(f.formTitle)}</div>
        <div class="card-meta">
          <span>
            <span class="badge">${f.respondentAccess==="all"?"Semua Responden":"Responden Terpilih"}</span>
          </span>
          ${f.visibleFields&&f.visibleFields.length
            ?`<span>Variabel: ${esc(f.visibleFields.slice(0,3).join(", "))}${f.visibleFields.length>3?` +${f.visibleFields.length-3} lainnya`:""}</span>`
            :`<span>Semua variabel terlihat</span>`}
        </div>
        <div>
          <a class="btn primary" href="/viewer-responses?id=${esc(f.formId)}" style="width:100%;justify-content:center">
            Lihat Jawaban →
          </a>
        </div>
      </div>`).join("")}
    </div>`;
  }catch(e){
    el.innerHTML=`<div class="empty">Gagal memuat: ${esc(e.message)}</div>`;
  }
}
</script>
</body>
</html>
